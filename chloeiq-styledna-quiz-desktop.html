<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ChloeIQ — StyleDNA Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0B07;--s1:#13160D;--s2:#1A1E12;--s3:#222818;--acc:#B8E030;--ad:rgba(184,224,48,.10);--tx:#EEF0E5;--txm:#8A8F7A;--txd:#4A5040;--br:rgba(184,224,48,.12);--bs:rgba(238,240,229,.06);--grn:#4ADE80;--red:#FF5A4A;--amb:#F5A623;--blu:#60A5FA;--pur:#A78BFA;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden;}
.topbar{height:56px;display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--bs);background:var(--bg);gap:12px;position:sticky;top:0;z-index:20;}
.lm{width:28px;height:28px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:var(--bg);}
.lt{font-family:'Fraunces',serif;font-size:17px;}.lt b{color:var(--acc);font-weight:400;}
.pt{font-family:'Fraunces',serif;font-size:18px;font-weight:400;}.pt em{color:var(--acc);font-style:italic;}
.sep{width:1px;height:20px;background:var(--bs);}
.tr{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .13s;}
.bp{background:var(--acc);color:var(--bg);}.bp:hover{background:#c8f040;}
.bs2{background:transparent;color:var(--txm);border:1px solid var(--bs);}.bs2:hover{border-color:var(--br);color:var(--tx);background:var(--s1);}
.main{padding:28px 32px;display:flex;flex-direction:column;gap:22px;max-height:calc(100vh - 56px);overflow-y:auto;}
.panel{background:var(--s1);border:1px solid var(--bs);border-radius:11px;overflow:hidden;}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bs);}
.pht{font-size:13px;font-weight:600;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi{background:var(--s1);border:1px solid var(--bs);border-radius:10px;padding:15px 17px;transition:border-color .13s;}
.kpi:hover{border-color:var(--br);}.ka{border-left:2px solid var(--acc);}.ka .kv{color:var(--acc);}
.kl{font-family:'DM Mono',monospace;font-size:9px;color:var(--txd);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.kv{font-family:'Fraunces',serif;font-size:26px;line-height:1;}.kd{font-size:11px;margin-top:4px;}
.up{color:var(--grn);}.ne{color:var(--txm);}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--bs);background:var(--s2);color:var(--txm);transition:all .12s;}
.chip:hover{border-color:var(--br);color:var(--tx);}.chip.active{background:var(--ad);border-color:var(--br);color:var(--acc);}
::-webkit-scrollbar{width:3px;}</style>
</head>
<body>
<header class="topbar">
  <div class="lm">C</div><div class="lt">Chloe<b>IQ</b></div>
  <div class="sep"></div>
  <div class="pt">Style<em>DNA</em> Quiz</div><div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--txm);" id="quiz-progress">Question 1 of 8</div><div class="tr"><button class="btn bs2" id="quiz-back">← Back</button><button class="btn bp" id="quiz-next">Next →</button></div>
</header>
<div class="main">

<div style="max-width:860px;margin:0 auto;display:flex;flex-direction:column;gap:24px;">
  <div style="height:4px;background:var(--s3);border-radius:2px;overflow:hidden;"><div id="quiz-bar" style="height:4px;background:var(--acc);border-radius:2px;width:12.5%;transition:width .4s;"></div></div>
  <div id="quiz-body"></div>
</div>

</div>
<script>
function toast(msg,type){var o=document.getElementById('_t');if(o)o.remove();var t=document.createElement('div');t.id='_t';t.textContent=msg;var bg=type==='ok'?'#B8E030':'#1A1E12';var c=type==='ok'?'#0A0B07':'#EEF0E5';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:'+bg+';color:'+c+';padding:10px 20px;border-radius:8px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .2s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid rgba(184,224,48,.15);';document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});clearTimeout(t._x);t._x=setTimeout(function(){t.style.opacity='0';},2600);}
function modal(title,body,label,cb){var o=document.getElementById('_m');if(o)o.remove();var el=document.createElement('div');el.id='_m';el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9990;display:flex;align-items:center;justify-content:center;';el.innerHTML='<div style="background:#13160D;border:1px solid rgba(184,224,48,.15);border-radius:13px;padding:26px 28px;min-width:380px;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.6);"><div style="font-family:Fraunces,serif;font-size:19px;margin-bottom:9px;">'+title+'</div><div style="font-size:13px;color:#8A8F7A;line-height:1.6;margin-bottom:20px;">'+body+'</div><div style="display:flex;gap:9px;justify-content:flex-end;"><button id="_mc" style="padding:7px 16px;border-radius:7px;border:1px solid rgba(238,240,229,.08);background:transparent;color:#8A8F7A;font-family:DM Sans,sans-serif;font-size:12px;cursor:pointer;">Cancel</button><button id="_mo" style="padding:7px 16px;border-radius:7px;border:none;background:#B8E030;color:#0A0B07;font-family:DM Sans,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">'+(label||'OK')+'</button></div></div>';document.body.appendChild(el);el.querySelector('#_mc').onclick=function(){el.remove();};el.querySelector('#_mo').onclick=function(){el.remove();if(cb)cb();};el.onclick=function(e){if(e.target===el)el.remove();};}

var questions=[
  {q:"When you walk into a home, what's the first thing you notice?",opts:["The flow of natural light","The architectural details and lines","The warmth of the materials","The boldness of the design choices","The practicality of the layout","The overall feeling of serenity"]},
  {q:"Your ideal kitchen looks like...",opts:["Bright white with integrated appliances","Sleek handle-less cabinetry, quartz counters","Warm wood tones, farmhouse sink","Open shelves, colorful accents","Professional-grade appliances, functional","Minimal, hidden storage everywhere"]},
  {q:"For your living room, you'd choose...",opts:["A statement sofa, curated art wall","Clean-lined furniture, one accent piece","Cozy layered textiles, plants","Eclectic mix of vintage and modern","Comfortable, kid-friendly, durable","Nothing unnecessary — pure function"]},
  {q:"Your outdoor space should be...",opts:["A resort-style pool area","A clean patio with architectural planters","A garden with raised beds and fire pit","A creative space for entertaining","A safe yard for kids and pets","A low-maintenance, private escape"]},
  {q:"How many bedrooms do you need?",opts:["2 — just us","3 — room to grow","4 — family is everything","5+ — we host often","1 — minimalist life","Flexible — open to anything"]},
  {q:"What's your budget range?",opts:["Under $400K","$400K–$600K","$600K–$800K","$800K–$1.1M","$1.1M–$1.5M","$1.5M+"]},
  {q:"How soon are you looking to move?",opts:["Immediately — actively searching","1–3 months","3–6 months","6–12 months","Just exploring for now","Depends on finding the right place"]},
  {q:"What matters most in your next home?",opts:["Location above everything","Design and aesthetic","Space for family","Investment potential","Good schools nearby","Privacy and land"]},
];
var dnaTypes={
  0:"Coastal Luxe",1:"Refined Modern",2:"Warm Organic",3:"Bold Eclectic",4:"Family Forward",5:"Minimalist Zen"
};
var answers=[];
var cur=0;
function renderQ(n){
  var q=questions[n];
  var body=document.getElementById('quiz-body');
  body.innerHTML='<div style="display:flex;flex-direction:column;gap:20px;">'
    +'<div style="font-family:'Fraunces',serif;font-size:22px;line-height:1.4;">'+q.q+'</div>'
    +'<div class="g2" style="gap:12px;" id="opts-grid"></div>'
    +'</div>';
  var grid=document.getElementById('opts-grid');
  q.opts.forEach(function(opt,i){
    var isSelected=answers[n]===i;
    var card=document.createElement('div');
    card.style.cssText='padding:16px 18px;background:'+(isSelected?'var(--ad)':'var(--s1)')+';border:1px solid '+(isSelected?'var(--acc)':'var(--bs)')+';border-radius:10px;cursor:pointer;transition:all .13s;font-size:13px;color:'+(isSelected?'var(--acc)':'var(--txm)')+';';
    card.textContent=opt;
    card.dataset.opt=i;
    card.addEventListener('click',function(){answers[n]=i;renderQ(n);});
    card.addEventListener('mouseover',function(){if(answers[n]!==i){card.style.borderColor='var(--br)';card.style.color='var(--tx)';}});
    card.addEventListener('mouseout',function(){if(answers[n]!==i){card.style.borderColor='var(--bs)';card.style.color='var(--txm)';}});
    grid.appendChild(card);
  });
  document.getElementById('quiz-progress').textContent='Question '+(n+1)+' of '+questions.length;
  document.getElementById('quiz-bar').style.width=(((n+1)/questions.length)*100)+'%';
  document.getElementById('quiz-back').style.display=n===0?'none':'';
  document.getElementById('quiz-next').textContent=n===questions.length-1?'See My Results →':'Next →';
}
function showResults(){
  var counts={};for(var i=0;i<6;i++)counts[i]=0;
  answers.forEach(function(a){if(a!==undefined)counts[a]=(counts[a]||0)+1;});
  var topDNA=0,topCount=0;
  Object.keys(counts).forEach(function(k){if(counts[k]>topCount){topCount=counts[k];topDNA=parseInt(k);}});
  var dna=dnaTypes[topDNA]||'Refined Modern';
  var desc={
    "Refined Modern":"You value clean lines, intentional design, and spaces where form meets function. Open-concept living, neutral palettes with one bold element, and seamless indoor-outdoor flow define your ideal home.",
    "Coastal Luxe":"Light-filled, resort-inspired spaces with quality materials and a relaxed elegance. You want a home that feels like a retreat — pool, great natural light, and elevated finishes throughout.",
    "Warm Organic":"Natural textures, earthy tones, and spaces that feel alive. You love wood, stone, plants, and homes that connect you to nature without sacrificing comfort or practicality.",
    "Bold Eclectic":"You're not afraid of color, texture, or a statement piece. Your home should tell a story — a curated mix of styles, eras, and materials that's unmistakably yours.",
    "Family Forward":"Livability is everything. Great schools, durable materials, a yard for kids, and enough space for everyone to have their own corner. Home is the center of life.",
    "Minimalist Zen":"Less is infinitely more. You want a home that's calm, clutter-free, and considered. Every object should earn its place. Privacy, simplicity, and function above all."
  };
  document.getElementById('quiz-body').innerHTML='<div style="display:flex;flex-direction:column;gap:20px;">'
    +'<div style="background:var(--s1);border:1px solid var(--br);border-radius:14px;padding:28px;text-align:center;">'
    +'<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--acc);letter-spacing:.8px;margin-bottom:8px;">YOUR STYLE DNA</div>'
    +'<div style="font-family:'Fraunces',serif;font-size:36px;color:var(--acc);margin-bottom:10px;">'+dna+'</div>'
    +'<div style="font-size:14px;color:var(--txm);line-height:1.7;max-width:560px;margin:0 auto 20px;">'+desc[dna]+'</div>'
    +'<div style="display:flex;gap:10px;justify-content:center;">'
    +'<button class="btn bp" style="font-size:14px;padding:10px 24px;" id="dna-homes">See Matching Homes →</button>'
    +'<button class="btn bs2" id="dna-retry">Retake Quiz</button>'
    +'</div></div></div>';
  document.getElementById('quiz-progress').textContent='Complete!';
  document.getElementById('quiz-bar').style.width='100%';
  document.getElementById('quiz-back').style.display='none';
  document.getElementById('quiz-next').style.display='none';
  document.getElementById('dna-retry').addEventListener('click',function(){answers=[];cur=0;document.getElementById('quiz-next').style.display='';renderQ(0);});
  document.getElementById('dna-homes').addEventListener('click',function(){toast('Loading homes matching '+dna+' DNA...','');setTimeout(function(){window.location.href='chloeiq-buyer-app-desktop.html?dna='+encodeURIComponent(dna);},600);});
}
document.addEventListener('DOMContentLoaded',function(){
  renderQ(0);
  document.getElementById('quiz-next').addEventListener('click',function(){
    if(cur===questions.length-1){showResults();}
    else{cur++;renderQ(cur);}
  });
  document.getElementById('quiz-back').addEventListener('click',function(){if(cur>0){cur--;renderQ(cur);}});
});

</script>
<script src="chloeiq-nav.js"></script>
</body>
</html>
