<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ChloeIQ — Buyer Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0B07;--s1:#13160D;--s2:#1A1E12;--s3:#222818;--acc:#B8E030;--ad:rgba(184,224,48,.10);--tx:#EEF0E5;--txm:#8A8F7A;--txd:#4A5040;--br:rgba(184,224,48,.12);--bs:rgba(238,240,229,.06);--grn:#4ADE80;--red:#FF5A4A;--amb:#F5A623;--blu:#60A5FA;--pur:#A78BFA;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden;}
.topbar{height:56px;display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--bs);background:var(--bg);gap:12px;position:sticky;top:0;z-index:20;}
.lm{width:28px;height:28px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:var(--bg);}
.lt{font-family:'Fraunces',serif;font-size:17px;}.lt b{color:var(--acc);font-weight:400;}
.pt{font-family:'Fraunces',serif;font-size:18px;font-weight:400;}.pt em{color:var(--acc);font-style:italic;}
.sep{width:1px;height:20px;background:var(--bs);}
.tr{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .13s;}
.bp{background:var(--acc);color:var(--bg);}.bp:hover{background:#c8f040;}
.bs2{background:transparent;color:var(--txm);border:1px solid var(--bs);}.bs2:hover{border-color:var(--br);color:var(--tx);background:var(--s1);}
.main{padding:28px 32px;display:flex;flex-direction:column;gap:22px;max-height:calc(100vh - 56px);overflow-y:auto;}
.panel{background:var(--s1);border:1px solid var(--bs);border-radius:11px;overflow:hidden;}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bs);}
.pht{font-size:13px;font-weight:600;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi{background:var(--s1);border:1px solid var(--bs);border-radius:10px;padding:15px 17px;transition:border-color .13s;}
.kpi:hover{border-color:var(--br);}.ka{border-left:2px solid var(--acc);}.ka .kv{color:var(--acc);}
.kl{font-family:'DM Mono',monospace;font-size:9px;color:var(--txd);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.kv{font-family:'Fraunces',serif;font-size:26px;line-height:1;}.kd{font-size:11px;margin-top:4px;}
.up{color:var(--grn);}.ne{color:var(--txm);}
::-webkit-scrollbar{width:3px;}</style>
</head>
<body>
<header class="topbar">
  <div class="lm">C</div><div class="lt">Chloe<b>IQ</b></div>
  <div class="sep"></div>
  <div class="pt">Buyer <em>Onboarding</em></div><div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--txm);" id="ob-step-lbl">Step 1 of 5</div><div class="tr"><button class="btn bp" id="ob-next">Continue →</button></div>
</header>
<div class="main">

<div style="max-width:740px;margin:0 auto;display:flex;flex-direction:column;gap:24px;">
  <div style="height:4px;background:var(--s3);border-radius:2px;overflow:hidden;"><div id="ob-bar" style="height:4px;background:var(--acc);border-radius:2px;width:20%;transition:width .4s;"></div></div>
  <div id="ob-body"></div>
</div>

</div>
<script>
function toast(msg,type){var o=document.getElementById('_t');if(o)o.remove();var t=document.createElement('div');t.id='_t';t.textContent=msg;var bg=type==='ok'?'#B8E030':'#1A1E12';var c=type==='ok'?'#0A0B07':'#EEF0E5';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:'+bg+';color:'+c+';padding:10px 20px;border-radius:8px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .2s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid rgba(184,224,48,.15);';document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});clearTimeout(t._x);t._x=setTimeout(function(){t.style.opacity='0';},2600);}
function modal(title,body,label,cb){var o=document.getElementById('_m');if(o)o.remove();var el=document.createElement('div');el.id='_m';el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9990;display:flex;align-items:center;justify-content:center;';el.innerHTML='<div style="background:#13160D;border:1px solid rgba(184,224,48,.15);border-radius:13px;padding:26px 28px;min-width:380px;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.6);"><div style="font-family:Fraunces,serif;font-size:19px;margin-bottom:9px;">'+title+'</div><div style="font-size:13px;color:#8A8F7A;line-height:1.6;margin-bottom:20px;">'+body+'</div><div style="display:flex;gap:9px;justify-content:flex-end;"><button id="_mc" style="padding:7px 16px;border-radius:7px;border:1px solid rgba(238,240,229,.08);background:transparent;color:#8A8F7A;font-family:DM Sans,sans-serif;font-size:12px;cursor:pointer;">Cancel</button><button id="_mo" style="padding:7px 16px;border-radius:7px;border:none;background:#B8E030;color:#0A0B07;font-family:DM Sans,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">'+(label||'OK')+'</button></div></div>';document.body.appendChild(el);el.querySelector('#_mc').onclick=function(){el.remove();};el.querySelector('#_mo').onclick=function(){el.remove();if(cb)cb();};el.onclick=function(e){if(e.target===el)el.remove();};}

var steps=[
  {
    title:"Welcome to ChloeIQ",
    sub:"The smarter way to find your perfect home.",
    content:function(){return '<div style="display:flex;flex-direction:column;gap:16px;"><div style="background:var(--s1);border:1px solid var(--bs);border-radius:12px;padding:24px;display:flex;flex-direction:column;gap:14px;"><label style="font-family:'DM Mono',monospace;font-size:10px;color:var(--txm);letter-spacing:.5px;display:block;margin-bottom:4px;">YOUR NAME</label><input id="ob-name" placeholder="Jordan Lee" value="Jordan Lee"><label style="font-family:'DM Mono',monospace;font-size:10px;color:var(--txm);letter-spacing:.5px;display:block;margin-bottom:4px;">EMAIL</label><input id="ob-email" placeholder="jordan@example.com" type="email"><label style="font-family:'DM Mono',monospace;font-size:10px;color:var(--txm);letter-spacing:.5px;display:block;margin-bottom:4px;">PHONE</label><input id="ob-phone" placeholder="(214) 555-0123" type="tel"></div></div>';}
  },
  {
    title:"Take the StyleDNA Quiz",
    sub:"8 quick questions to define your buyer profile.",
    content:function(){return '<div style="background:var(--s1);border:1px solid var(--br);border-radius:12px;padding:28px;text-align:center;"><div style="font-size:48px;margin-bottom:12px;">🧬</div><div style="font-family:'Fraunces',serif;font-size:22px;margin-bottom:8px;">Discover Your Style<em style='color:var(--acc);font-style:italic;'>DNA</em></div><div style="font-size:13px;color:var(--txm);line-height:1.7;max-width:440px;margin:0 auto 20px;">8 questions, 2 minutes. Chloe uses your answers to match you with homes that actually fit your lifestyle — not just your price range.</div><div style="display:flex;gap:8px;justify-content:center;"><button class="btn bp" style="font-size:14px;padding:10px 24px;" id="ob-quiz">Take Quiz Now →</button><button class="btn bs2" id="ob-skip-quiz">Skip for now</button></div><div style="margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:420px;margin:16px auto 0;">'+["Refined Modern","Coastal Luxe","Warm Organic","Bold Eclectic","Family Forward","Minimalist Zen"].map(function(d){return '<div style="background:var(--s2);border:1px solid var(--bs);border-radius:8px;padding:8px;font-size:11px;color:var(--txm);">'+d+'</div>';}).join('')+'</div></div>';}
  },
  {
    title:"Your Search Preferences",
    sub:"Help us narrow the search.",
    content:function(){return '<div style="background:var(--s1);border:1px solid var(--bs);border-radius:12px;padding:24px;display:flex;flex-direction:column;gap:16px;"><div class="g2" style="gap:12px;"><div><label style="font-family:'DM Mono',monospace;font-size:10px;color:var(--txm);letter-spacing:.5px;display:block;margin-bottom:5px;">BUDGET RANGE</label><select><option>$400K – $600K</option><option selected>$600K – $800K</option><option>$800K – $1.1M</option><option>$1.1M+</option></select></div><div><label style="font-family:'DM Mono',monospace;font-size:10px;color:var(--txm);letter-spacing:.5px;display:block;margin-bottom:5px;">BEDROOMS</label><select><option>2+</option><option selected>3+</option><option>4+</option><option>5+</option></select></div><div><label style="font-family:'DM Mono',monospace;font-size:10px;color:var(--txm);letter-spacing:.5px;display:block;margin-bottom:5px;">TARGET AREA</label><select><option selected>Flower Mound / Lewisville</option><option>Frisco / McKinney</option><option>Southlake / Grapevine</option><option>Plano / Allen</option></select></div><div><label style="font-family:'DM Mono',monospace;font-size:10px;color:var(--txm);letter-spacing:.5px;display:block;margin-bottom:5px;">TIMELINE</label><select><option>ASAP</option><option selected>1–3 months</option><option>3–6 months</option><option>Just exploring</option></select></div></div></div>';}
  },
  {
    title:"Connect with an Agent",
    sub:"Get matched with a ChloeIQ-certified agent in your area.",
    content:function(){return '<div style="display:flex;flex-direction:column;gap:12px;"><div style="background:var(--s1);border:1px solid var(--br);border-radius:12px;padding:20px;display:flex;gap:16px;align-items:center;cursor:pointer;" id="agent-card"><div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#7AB800,var(--acc));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--bg);flex-shrink:0;">MR</div><div style="flex:1;"><div style="font-size:15px;font-weight:600;">Marcus Rivera</div><div style="font-size:12px;color:var(--txm);">REAL Broker · Flower Mound · Host Score 780</div><div style="font-size:12px;color:var(--acc);margin-top:4px;">🥇 Gold Tier · 47 leads this month · 38% conversion</div></div><button class="btn bp" style="flex-shrink:0;" id="ob-connect">Connect</button></div><div style="background:var(--s2);border:1px solid var(--bs);border-radius:12px;padding:20px;display:flex;gap:16px;align-items:center;cursor:pointer;opacity:.7;"><div style="width:52px;height:52px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--txm);flex-shrink:0;">ER</div><div style="flex:1;"><div style="font-size:15px;font-weight:600;">Elena Reyes</div><div style="font-size:12px;color:var(--txm);">Compass · Southlake · Host Score 720</div><div style="font-size:12px;color:var(--txm);margin-top:4px;">Silver Tier · 28 leads this month</div></div><button class="btn bs2" style="flex-shrink:0;">Select</button></div></div>';}
  },
  {
    title:"You're All Set!",
    sub:"",
    content:function(){return '<div style="text-align:center;display:flex;flex-direction:column;gap:18px;align-items:center;min-height:280px;justify-content:center;"><div style="font-size:56px;">🎉</div><div style="font-family:'Fraunces',serif;font-size:30px;">Welcome to <em style='color:var(--acc);font-style:italic;'>ChloeIQ</em></div><div style="font-size:14px;color:var(--txm);max-width:460px;line-height:1.7;">Your profile is set up. Head to your buyer dashboard to explore matched homes, view your StyleDNA breakdown, and connect with Marcus about showings.</div><button class="btn bp" style="font-size:14px;padding:10px 28px;" id="ob-go">Open My Dashboard →</button></div>';}
  }
];
var cur=0;
function render(n){
  var s=steps[n];
  document.getElementById('ob-step-lbl').textContent='Step '+(n+1)+' of '+steps.length;
  document.getElementById('ob-bar').style.width=(((n+1)/steps.length)*100)+'%';
  document.getElementById('ob-next').textContent=n===steps.length-1?'Go to Dashboard →':'Continue →';
  document.getElementById('ob-body').innerHTML='<div style="display:flex;flex-direction:column;gap:16px;"><div style="font-family:'Fraunces',serif;font-size:24px;font-weight:400;">'+s.title+(s.sub?'<div style='font-size:14px;color:var(--txm);margin-top:4px;font-family:DM Sans,sans-serif;font-weight:400;'>'+s.sub+'</div>':'')+'</div>'+s.content()+'</div>';
  // wire
  var quiz=document.getElementById('ob-quiz');if(quiz)quiz.addEventListener('click',function(){window.location.href='chloeiq-styledna-quiz-desktop.html?from=onboarding';});
  var skip=document.getElementById('ob-skip-quiz');if(skip)skip.addEventListener('click',function(){cur++;render(cur);});
  var conn=document.getElementById('ob-connect');if(conn)conn.addEventListener('click',function(){toast('Connected with Marcus Rivera ✓','ok');});
  var ac=document.getElementById('agent-card');if(ac)ac.addEventListener('click',function(){toast('Viewing Marcus Rivera profile...','');});
  var go=document.getElementById('ob-go');if(go)go.addEventListener('click',function(){window.location.href='chloeiq-buyer-app-desktop.html?from=onboarding';});
}
document.addEventListener('DOMContentLoaded',function(){
  render(0);
  document.getElementById('ob-next').addEventListener('click',function(){
    if(cur===steps.length-1){window.location.href='chloeiq-buyer-app-desktop.html?from=onboarding';}
    else{cur++;render(cur);}
  });
});

</script>
<script src="chloeiq-nav.js"></script>
</body>
</html>
