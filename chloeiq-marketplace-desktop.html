<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ChloeIQ — Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0B07;--s1:#13160D;--s2:#1A1E12;--s3:#222818;--acc:#B8E030;--ad:rgba(184,224,48,.10);--tx:#EEF0E5;--txm:#8A8F7A;--txd:#4A5040;--br:rgba(184,224,48,.12);--bs:rgba(238,240,229,.06);--grn:#4ADE80;--red:#FF5A4A;--amb:#F5A623;--blu:#60A5FA;--pur:#A78BFA;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden;}
.topbar{height:56px;display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--bs);background:var(--bg);gap:12px;position:sticky;top:0;z-index:20;}
.lm{width:28px;height:28px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:var(--bg);}
.lt{font-family:'Fraunces',serif;font-size:17px;}.lt b{color:var(--acc);font-weight:400;}
.pt{font-family:'Fraunces',serif;font-size:18px;font-weight:400;}.pt em{color:var(--acc);font-style:italic;}
.sep{width:1px;height:20px;background:var(--bs);}
.tr{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .13s;}
.bp{background:var(--acc);color:var(--bg);}.bp:hover{background:#c8f040;}
.bs2{background:transparent;color:var(--txm);border:1px solid var(--bs);}.bs2:hover{border-color:var(--br);color:var(--tx);background:var(--s1);}
.main{padding:28px 32px;display:flex;flex-direction:column;gap:22px;max-height:calc(100vh - 56px);overflow-y:auto;}
.panel{background:var(--s1);border:1px solid var(--bs);border-radius:11px;overflow:hidden;}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bs);}
.pht{font-size:13px;font-weight:600;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi{background:var(--s1);border:1px solid var(--bs);border-radius:10px;padding:15px 17px;transition:border-color .13s;}
.kpi:hover{border-color:var(--br);}.ka{border-left:2px solid var(--acc);}.ka .kv{color:var(--acc);}
.kl{font-family:'DM Mono',monospace;font-size:9px;color:var(--txd);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.kv{font-family:'Fraunces',serif;font-size:26px;line-height:1;}.kd{font-size:11px;margin-top:4px;}
.up{color:var(--grn);}.dn{color:var(--red);}.ne{color:var(--txm);}
.pill{display:inline-flex;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.pg{background:rgba(74,222,128,.10);color:var(--grn);}.pa{background:rgba(245,166,35,.10);color:var(--amb);}
.pb{background:rgba(96,165,250,.10);color:var(--blu);}.pac{background:var(--ad);color:var(--acc);}
.bb{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;}
.bf{height:5px;border-radius:3px;background:var(--acc);}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--bs);background:var(--s2);color:var(--txm);transition:all .12s;}
.chip:hover{border-color:var(--br);color:var(--tx);}.chip.active{background:var(--ad);border-color:var(--br);color:var(--acc);}
input,select,textarea{background:var(--s2);border:1px solid var(--bs);border-radius:7px;padding:9px 12px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%;transition:border-color .13s;}
input:focus,select:focus{border-color:var(--br);}
::-webkit-scrollbar{width:3px;}</style>
</head>
<body>
<header class="topbar">
  <div class="lm">C</div><div class="lt">Chloe<b>IQ</b></div>
  <div class="sep"></div>
  <div class="pt">Opportunity <em>Marketplace</em></div><div class="tr"><button class="btn bs2" id="mkt-filter">Filter</button><button class="btn bp" id="mkt-post">Post Listing</button></div>
</header>
<div class="main">

<div class="g4">
  <div class="kpi ka"><div class="kl">Open Opportunities</div><div class="kv">24</div><div class="kd up">↑ 6 this week</div></div>
  <div class="kpi"><div class="kl">Your Applications</div><div class="kv">7</div><div class="kd ne">3 pending</div></div>
  <div class="kpi"><div class="kl">Avg Match Score</div><div class="kv">74<span style="font-size:13px;color:var(--txm);">%</span></div><div class="kd up">↑ Above avg</div></div>
  <div class="kpi"><div class="kl">Listings Posted</div><div class="kv">3</div><div class="kd ne">All active</div></div>
</div>
<div style="display:flex;gap:7px;flex-wrap:wrap;">
  <div class="chip active" id="chip-all">All (24)</div>
  <div class="chip" id="chip-hot">🔥 High Demand</div>
  <div class="chip" id="chip-new">New This Week</div>
  <div class="chip" id="chip-near">Nearby ZIP</div>
</div>
<div class="g3" id="opp-grid"></div>
<div class="panel">
  <div class="ph"><div class="pht">My Applications</div></div>
  <div style="display:grid;grid-template-columns:1fr 100px 70px 90px;padding:9px 18px;border-bottom:1px solid var(--bs);">
    <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--txd);letter-spacing:.5px;text-transform:uppercase;">Opportunity</span>
    <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--txd);letter-spacing:.5px;text-transform:uppercase;">Applied</span>
    <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--txd);letter-spacing:.5px;text-transform:uppercase;">Match</span>
    <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--txd);letter-spacing:.5px;text-transform:uppercase;">Status</span>
  </div>
  <div id="app-rows"></div>
</div>

</div>
<script>
function toast(msg,type){var o=document.getElementById('_t');if(o)o.remove();var t=document.createElement('div');t.id='_t';t.textContent=msg;var bg=type==='ok'?'#B8E030':'#1A1E12';var c=type==='ok'?'#0A0B07':'#EEF0E5';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:'+bg+';color:'+c+';padding:10px 20px;border-radius:8px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .2s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid rgba(184,224,48,.15);';document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});clearTimeout(t._x);t._x=setTimeout(function(){t.style.opacity='0';},2600);}
function modal(title,body,label,cb){var o=document.getElementById('_m');if(o)o.remove();var el=document.createElement('div');el.id='_m';el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9990;display:flex;align-items:center;justify-content:center;';el.innerHTML='<div style="background:#13160D;border:1px solid rgba(184,224,48,.15);border-radius:13px;padding:26px 28px;min-width:380px;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.6);"><div style="font-family:Fraunces,serif;font-size:19px;margin-bottom:9px;">'+title+'</div><div style="font-size:13px;color:#8A8F7A;line-height:1.6;margin-bottom:20px;">'+body+'</div><div style="display:flex;gap:9px;justify-content:flex-end;"><button id="_mc" style="padding:7px 16px;border-radius:7px;border:1px solid rgba(238,240,229,.08);background:transparent;color:#8A8F7A;font-family:DM Sans,sans-serif;font-size:12px;cursor:pointer;">Cancel</button><button id="_mo" style="padding:7px 16px;border-radius:7px;border:none;background:#B8E030;color:#0A0B07;font-family:DM Sans,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">'+(label||'OK')+'</button></div></div>';document.body.appendChild(el);el.querySelector('#_mc').onclick=function(){el.remove();};el.querySelector('#_mo').onclick=function(){el.remove();if(cb)cb();};el.onclick=function(e){if(e.target===el)el.remove();};}

var opps=[
  {addr:'2847 Magnolia Drive',area:'Flower Mound 75022',score:94,visitors:247,dna:'Refined Modern',price:'$724K',demand:'hot'},
  {addr:'3310 Elmhurst Blvd',area:'Frisco 75034',score:91,visitors:218,dna:'Coastal Luxe',price:'$868K',demand:'hot'},
  {addr:'1105 Ridgecrest Ln',area:'Southlake 76092',score:88,visitors:196,dna:'Refined Modern',price:'$1.1M',demand:'hot'},
  {addr:'7712 Crestview Pkwy',area:'Plano 75024',score:82,visitors:184,dna:'Warm Organic',price:'$612K',demand:'warm'},
  {addr:'504 Lakeview Court',area:'Grapevine 76051',score:78,visitors:167,dna:'Warm Organic',price:'$584K',demand:'warm'},
  {addr:'910 Willowbend Dr',area:'Lewisville 75028',score:64,visitors:122,dna:'Bold Eclectic',price:'$498K',demand:'cool'},
];
var apps=[
  {addr:'2847 Magnolia Drive',area:'Flower Mound',date:'Mar 28',match:87,status:'accepted'},
  {addr:'3310 Elmhurst Blvd',area:'Frisco',date:'Mar 25',match:74,status:'pending'},
  {addr:'504 Lakeview Court',area:'Grapevine',date:'Mar 18',match:68,status:'pending'},
];
function buildGrid(){
  var el=document.getElementById('opp-grid');if(!el)return;el.innerHTML='';
  opps.forEach(function(o,i){
    var hc=o.demand==='hot'?'var(--acc)':o.demand==='warm'?'var(--amb)':'var(--blu)';
    el.innerHTML+='<div style="background:var(--s1);border:1px solid var(--bs);border-radius:10px;padding:18px;cursor:pointer;transition:border-color .13s;" class="opp-card">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">'
      +'<div><div style="font-size:13px;font-weight:600;">'+o.addr+'</div><div style="font-size:11px;color:var(--txm);margin-top:2px;">'+o.area+'</div></div>'
      +'<div style="font-family:'Fraunces',serif;font-size:26px;color:'+hc+';">'+o.score+'</div>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;">'
      +'<div><div style="font-family:'DM Mono',monospace;font-size:11px;">'+o.visitors+'</div><div style="font-size:10px;color:var(--txd);">Visitors</div></div>'
      +'<div><div style="font-size:11px;color:var(--txm);">'+o.dna+'</div><div style="font-size:10px;color:var(--txd);">DNA</div></div>'
      +'<div><div style="font-family:'DM Mono',monospace;font-size:11px;">'+o.price+'</div><div style="font-size:10px;color:var(--txd);">Price</div></div>'
      +'</div>'
      +'<div style="display:flex;gap:7px;">'
      +'<button class="btn bp" style="flex:1;justify-content:center;font-size:11px;" data-apply="'+i+'">Apply Now</button>'
      +'<button class="btn bs2" style="flex:1;justify-content:center;font-size:11px;" data-det="'+i+'">Details</button>'
      +'</div></div>';
  });
  document.querySelectorAll('[data-apply]').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();var o=opps[parseInt(b.dataset.apply)];modal('Apply for '+o.addr,'Submit your agent profile for this opportunity. The listing agent will review your Host Score and match data.','Submit Application',function(){toast('Application submitted ✓','ok');b.textContent='Applied ✓';b.disabled=true;});});});
  document.querySelectorAll('[data-det]').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();var o=opps[parseInt(b.dataset.det)];toast(o.addr+' · Demand '+o.score+' · '+o.dna,'');});});
  document.querySelectorAll('.opp-card').forEach(function(c){c.addEventListener('mouseover',function(){c.style.borderColor='var(--br)';});c.addEventListener('mouseout',function(){c.style.borderColor='var(--bs)';});});
}
function buildApps(){
  var el=document.getElementById('app-rows');if(!el)return;el.innerHTML='';
  apps.forEach(function(a){
    var p=a.status==='accepted'?'<span class="pill pg">Accepted</span>':'<span class="pill pa">Pending</span>';
    el.innerHTML+='<div style="display:grid;grid-template-columns:1fr 100px 70px 90px;align-items:center;padding:10px 18px;border-bottom:1px solid var(--bs);cursor:pointer;transition:background .11s;gap:12px;" class="app-row"><div><div style="font-size:13px;font-weight:500;">'+a.addr+'</div><div style="font-size:11px;color:var(--txm);">'+a.area+'</div></div><span style="font-size:12px;color:var(--txm);">'+a.date+'</span><span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--acc);">'+a.match+'%</span>'+p+'</div>';
  });
  document.querySelectorAll('.app-row').forEach(function(r){r.addEventListener('mouseover',function(){r.style.background='var(--s2)';});r.addEventListener('mouseout',function(){r.style.background='';});});
}
document.addEventListener('DOMContentLoaded',function(){
  buildGrid();buildApps();
  document.querySelectorAll('#chip-all,#chip-hot,#chip-new,#chip-near').forEach(function(c){c.addEventListener('click',function(){document.querySelectorAll('#chip-all,#chip-hot,#chip-new,#chip-near').forEach(function(x){x.classList.remove('active');});c.classList.add('active');toast('Filter: '+c.textContent,'');});});
  document.getElementById('mkt-filter').addEventListener('click',function(){toast('Opening filter panel...','');});
  document.getElementById('mkt-post').addEventListener('click',function(){modal('Post New Listing','Add a property to the marketplace so agents can discover and apply to host open house events.','Post Listing',function(){toast('Listing posted ✓','ok');});});
});

</script>
<script src="chloeiq-nav.js"></script>
</body>
</html>
