<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ChloeIQ — Agent Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0B07;--s1:#13160D;--s2:#1A1E12;--s3:#222818;--acc:#B8E030;--ad:rgba(184,224,48,.10);--tx:#EEF0E5;--txm:#8A8F7A;--txd:#4A5040;--br:rgba(184,224,48,.12);--bs:rgba(238,240,229,.06);--grn:#4ADE80;--red:#FF5A4A;--amb:#F5A623;--blu:#60A5FA;--pur:#A78BFA;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden;}
.topbar{height:56px;display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--bs);background:var(--bg);gap:12px;position:sticky;top:0;z-index:20;}
.lm{width:28px;height:28px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:var(--bg);}
.lt{font-family:'Fraunces',serif;font-size:17px;}.lt b{color:var(--acc);font-weight:400;}
.pt{font-family:'Fraunces',serif;font-size:18px;font-weight:400;}.pt em{color:var(--acc);font-style:italic;}
.sep{width:1px;height:20px;background:var(--bs);}
.tr{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .13s;}
.bp{background:var(--acc);color:var(--bg);}.bp:hover{background:#c8f040;}
.bs2{background:transparent;color:var(--txm);border:1px solid var(--bs);}.bs2:hover{border-color:var(--br);color:var(--tx);background:var(--s1);}
.main{padding:28px 32px;display:flex;flex-direction:column;gap:22px;max-height:calc(100vh - 56px);overflow-y:auto;}
.view{display:none;flex-direction:column;gap:20px;}.view.active{display:flex;animation:fu .18s ease;}
@keyframes fu{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.panel{background:var(--s1);border:1px solid var(--bs);border-radius:11px;overflow:hidden;}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bs);}
.pht{font-size:13px;font-weight:600;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi{background:var(--s1);border:1px solid var(--bs);border-radius:10px;padding:15px 17px;transition:border-color .13s;}
.kpi:hover{border-color:var(--br);}.ka{border-left:2px solid var(--acc);}.ka .kv{color:var(--acc);}
.kl{font-family:'DM Mono',monospace;font-size:9px;color:var(--txd);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.kv{font-family:'Fraunces',serif;font-size:26px;line-height:1;}.kd{font-size:11px;margin-top:4px;}
.up{color:var(--grn);}.dn{color:var(--red);}.ne{color:var(--txm);}
.pill{display:inline-flex;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
.pg{background:rgba(74,222,128,.10);color:var(--grn);}.pa{background:rgba(245,166,35,.10);color:var(--amb);}
.pr{background:rgba(255,90,74,.10);color:var(--red);}.pb{background:rgba(96,165,250,.10);color:var(--blu);}
.pac{background:var(--ad);color:var(--acc);}.pm{background:var(--s3);color:var(--txd);}
.bb{height:5px;background:var(--s3);border-radius:3px;overflow:hidden;}
.bf{height:5px;border-radius:3px;background:var(--acc);}
input,select,textarea{background:var(--s2);border:1px solid var(--bs);border-radius:7px;padding:9px 12px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%;transition:border-color .13s;}
input:focus,select:focus,textarea:focus{border-color:var(--br);}
::-webkit-scrollbar{width:3px;height:3px;}</style>
</head>
<body>
<header class="topbar">
  <div class="lm">C</div><div class="lt">Chloe<b>IQ</b></div>
  <div class="sep"></div>
  <div class="pt">Agent <em>Setup</em></div><div class="tr"><button class="btn bs2" id="setup-save">Save Progress</button><button class="btn bp" id="setup-next">Next Step →</button></div>
</header>
<div class="main">

<div style="display:flex;gap:28px;align-items:flex-start;">
  <div style="width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;" id="step-nav"></div>
  <div style="flex:1;" id="step-content"></div>
</div>

</div>
<script>
function toast(msg,type){var o=document.getElementById('_t');if(o)o.remove();var t=document.createElement('div');t.id='_t';t.textContent=msg;var bg=type==='ok'?'#B8E030':'#1A1E12';var c=type==='ok'?'#0A0B07':'#EEF0E5';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:'+bg+';color:'+c+';padding:10px 20px;border-radius:8px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .2s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid rgba(184,224,48,.15);';document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});clearTimeout(t._x);t._x=setTimeout(function(){t.style.opacity='0';},2600);}
function modal(title,body,label,cb){var o=document.getElementById('_m');if(o)o.remove();var el=document.createElement('div');el.id='_m';el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9990;display:flex;align-items:center;justify-content:center;';el.innerHTML='<div style="background:#13160D;border:1px solid rgba(184,224,48,.15);border-radius:13px;padding:26px 28px;min-width:380px;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.6);"><div style="font-family:Fraunces,serif;font-size:19px;margin-bottom:9px;">'+title+'</div><div style="font-size:13px;color:#8A8F7A;line-height:1.6;margin-bottom:20px;">'+body+'</div><div style="display:flex;gap:9px;justify-content:flex-end;"><button id="_mc" style="padding:7px 16px;border-radius:7px;border:1px solid rgba(238,240,229,.08);background:transparent;color:#8A8F7A;font-family:DM Sans,sans-serif;font-size:12px;cursor:pointer;">Cancel</button><button id="_mo" style="padding:7px 16px;border-radius:7px;border:none;background:#B8E030;color:#0A0B07;font-family:DM Sans,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">'+(label||'OK')+'</button></div></div>';document.body.appendChild(el);el.querySelector('#_mc').onclick=function(){el.remove();};el.querySelector('#_mo').onclick=function(){el.remove();if(cb)cb();};el.onclick=function(e){if(e.target===el)el.remove();};}

var steps=[
  {title:'Create Account',sub:'Set up your profile'},
  {title:'Connect Your Brand',sub:'Logo and colors'},
  {title:'First Chloe Code',sub:'Generate your QR code'},
  {title:'Dashboard Prefs',sub:'Notifications and settings'},
  {title:'First Open House',sub:'What to do on the day'},
  {title:'Launch!',sub:'You're ready to go'},
];
var currentStep=0;

function stepContent(n){
  var s=steps[n];
  if(n===0) return '<div style="display:flex;flex-direction:column;gap:16px;"><div style="font-family:Fraunces,serif;font-size:22px;">Welcome to <em style='color:var(--acc);font-style:italic;'>ChloeIQ</em></div><div style="font-size:13px;color:var(--txm);line-height:1.6;">Set up your agent profile to start capturing buyer intelligence at every open house.</div><div class="panel"><div class="ph"><div class="pht">Your Profile</div></div><div style="padding:18px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px;"><div><label>FULL NAME</label><input value="Marcus Rivera"></div><div><label>BROKERAGE</label><input value="REAL Broker LLC"></div><div><label>LICENSE NUMBER</label><input placeholder="TX-12345678"></div><div><label>PRIMARY MARKET</label><select><option>DFW Metro</option><option>Houston</option><option>Austin</option></select></div><div><label>EMAIL</label><input value="marcus@realbroker.com"></div><div><label>PHONE</label><input value="(214) 555-0192"></div></div></div></div>';
  if(n===1) return '<div style="display:flex;flex-direction:column;gap:16px;"><div style="font-family:Fraunces,serif;font-size:22px;">Your <em style='color:var(--acc);font-style:italic;'>Brand</em></div><div style="font-size:13px;color:var(--txm);">Customize how buyers see your Chloe Codes.</div><div class="panel"><div class="ph"><div class="pht">Brand Settings</div></div><div style="padding:18px 20px;display:flex;flex-direction:column;gap:14px;"><div><label>BRAND NAME</label><input value="Marcus Rivera · REAL Broker"></div><div><label>ACCENT COLOR</label><div style="display:flex;gap:8px;margin-top:4px;" id="color-opts"></div></div><div><label>TAGLINE</label><input value="Your neighborhood expert in Flower Mound"></div></div></div></div>';
  if(n===2) return '<div style="display:flex;flex-direction:column;gap:16px;"><div style="font-family:Fraunces,serif;font-size:22px;">Your First <em style='color:var(--acc);font-style:italic;'>Chloe Code</em></div><div style="font-size:13px;color:var(--txm);">Generate a QR code for your first property. Print and place at the entrance.</div><div class="panel"><div class="ph"><div class="pht">Chloe Code Generator</div></div><div style="padding:24px;display:flex;gap:24px;align-items:center;"><div style="width:120px;height:120px;background:var(--s2);border:2px solid var(--br);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--txm);text-align:center;flex-shrink:0;">[ QR CODE ]</div><div style="flex:1;display:flex;flex-direction:column;gap:10px;"><div><label>PROPERTY ADDRESS</label><input value="2847 Magnolia Drive, Flower Mound TX 75022"></div><button class="btn bp" style="width:fit-content;" id="gen-code">Generate Chloe Code</button><button class="btn bs2" style="width:fit-content;" id="dl-code">Download PDF</button></div></div></div></div>';
  if(n===3) return '<div style="display:flex;flex-direction:column;gap:16px;"><div style="font-family:Fraunces,serif;font-size:22px;">Dashboard <em style='color:var(--acc);font-style:italic;'>Preferences</em></div><div class="panel"><div class="ph"><div class="pht">Notifications</div></div><div style="padding:16px 20px;display:flex;flex-direction:column;gap:0;" id="notif-rows"></div></div></div>';
  if(n===4) return '<div style="display:flex;flex-direction:column;gap:16px;"><div style="font-family:Fraunces,serif;font-size:22px;">Open House <em style='color:var(--acc);font-style:italic;'>Playbook</em></div><div style="display:flex;flex-direction:column;gap:10px;" id="playbook"></div></div>';
  if(n===5) return '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;min-height:320px;text-align:center;"><div style="font-size:56px;">🎉</div><div style="font-family:Fraunces,serif;font-size:30px;">You're <em style='color:var(--acc);font-style:italic;'>Ready!</em></div><div style="font-size:14px;color:var(--txm);max-width:420px;line-height:1.7;">ChloeIQ is configured and ready. Head to your Agent Dashboard to manage open houses, leads, and your Host Score.</div><button class="btn bp" style="font-size:14px;padding:10px 28px;margin-top:8px;" id="go-dashboard">Open Agent Dashboard →</button></div>';
  return '<div>Step '+(n+1)+'</div>';
}

function wireStep(n){
  var genBtn=document.getElementById('gen-code');
  if(genBtn)genBtn.addEventListener('click',function(){toast('Chloe Code generated for Magnolia Drive ✓','ok');});
  var dlBtn=document.getElementById('dl-code');
  if(dlBtn)dlBtn.addEventListener('click',function(){toast('Chloe-Code-Magnolia.pdf downloaded ✓','ok');});
  var goD=document.getElementById('go-dashboard');
  if(goD)goD.addEventListener('click',function(){window.location.href='chloeiq-agent-dashboard-desktop.html?from=setup&view=home';});
  var co=document.getElementById('color-opts');
  if(co){['#B8E030','#60A5FA','#F5A623','#A78BFA','#4ADE80','#FF5A4A'].forEach(function(c){var d=document.createElement('div');d.style.cssText='width:28px;height:28px;border-radius:6px;background:'+c+';cursor:pointer;border:2px solid transparent;transition:border-color .12s;';d.addEventListener('click',function(){co.querySelectorAll('div').forEach(function(x){x.style.borderColor='transparent';});d.style.borderColor='white';toast('Brand color updated ✓','ok');});co.appendChild(d);});}
  var nr=document.getElementById('notif-rows');
  if(nr){[['New lead captured',true],['Follow-up reminder',true],['Host Score update',true],['Weekly report',false]].forEach(function(item){var row=document.createElement('div');row.style.cssText='display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:10px 0;border-bottom:1px solid var(--bs);';var tog=document.createElement('div');tog.style.cssText='width:36px;height:20px;border-radius:10px;background:'+(item[1]?'var(--acc)':'var(--s3)')+';cursor:pointer;transition:background .2s;';var on=item[1];tog.addEventListener('click',function(){on=!on;tog.style.background=on?'var(--acc)':'var(--s3)';toast(item[0]+' notifications '+(on?'on':'off'),'');});row.innerHTML='<span style="color:var(--txm);">'+item[0]+'</span>';row.appendChild(tog);nr.appendChild(row);});}
  var pb=document.getElementById('playbook');
  if(pb){[['Place Chloe Code at entrance','Print the QR PDF — place at door, eye level, clearly visible'],['Let buyers scan themselves','Buyers scan, complete StyleDNA, and get their match score automatically'],['Watch leads appear in real time','Open your dashboard — leads populate as buyers complete the quiz'],['Send AI follow-ups same day','Chloe drafts personalized follow-ups — you review and send in one click']].forEach(function(item,i){pb.innerHTML+='<div style="display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:var(--s1);border:1px solid var(--bs);border-radius:9px;"><div style="width:26px;height:26px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--bg);flex-shrink:0;">'+(i+1)+'</div><div><div style="font-size:13px;font-weight:500;margin-bottom:3px;">'+item[0]+'</div><div style="font-size:12px;color:var(--txm);">'+item[1]+'</div></div></div>';});}
}

function renderStep(n){
  var nav=document.getElementById('step-nav');nav.innerHTML='';
  steps.forEach(function(s,i){
    nav.innerHTML+='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;background:'+(i===n?'var(--ad)':'transparent')+';border-left:2px solid '+(i===n?'var(--acc)':i<n?'var(--grn)':'transparent')+';transition:background .12s;" data-step="'+i+'">'
      +'<div style="width:22px;height:22px;border-radius:50%;background:'+(i<n?'var(--grn)':i===n?'var(--acc)':'var(--s3)')+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:'+(i<=n?'var(--bg)':'var(--txm)')+';">'+(i<n?'✓':(i+1))+'</div>'
      +'<div><div style="font-size:12.5px;font-weight:500;color:'+(i===n?'var(--acc)':i<n?'var(--tx)':'var(--txm)')+';">'+s.title+'</div><div style="font-size:11px;color:var(--txd);">'+s.sub+'</div></div>'
      +'</div>';
  });
  document.getElementById('step-content').innerHTML=stepContent(n);
  wireStep(n);
  document.querySelectorAll('[data-step]').forEach(function(el){el.addEventListener('click',function(){currentStep=parseInt(el.dataset.step);renderStep(currentStep);});});
}

document.addEventListener('DOMContentLoaded',function(){
  renderStep(0);
  document.getElementById('setup-next').addEventListener('click',function(){if(currentStep<steps.length-1){currentStep++;renderStep(currentStep);}else{window.location.href='chloeiq-agent-dashboard-desktop.html?from=setup';}});
  document.getElementById('setup-save').addEventListener('click',function(){toast('Progress saved ✓','ok');});
});

</script>
<script src="chloeiq-nav.js"></script>
</body>
</html>
