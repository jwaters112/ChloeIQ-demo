<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ChloeIQ — Buyer App</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0B07;--s1:#13160D;--s2:#1A1E12;--s3:#222818;--acc:#B8E030;--ad:rgba(184,224,48,.10);--tx:#EEF0E5;--txm:#8A8F7A;--txd:#4A5040;--br:rgba(184,224,48,.12);--bs:rgba(238,240,229,.06);--grn:#4ADE80;--red:#FF5A4A;--amb:#F5A623;--blu:#60A5FA;--pur:#A78BFA;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:DM Sans,sans-serif;font-size:14px;overflow-x:hidden;}
.topbar{height:56px;display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--bs);background:var(--bg);gap:12px;position:sticky;top:0;z-index:20;}
.lm{width:28px;height:28px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:Fraunces,serif;font-size:14px;font-weight:600;color:var(--bg);}
.lt{font-family:Fraunces,serif;font-size:17px;}.lt b{color:var(--acc);font-weight:400;}
.pt{font-family:Fraunces,serif;font-size:18px;font-weight:400;}.pt em{color:var(--acc);font-style:italic;}
.sep{width:1px;height:20px;background:var(--bs);}
.tr{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:8px;font-family:DM Sans,sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .13s;}
.bp{background:var(--acc);color:var(--bg);}.bp:hover{background:#c8f040;}
.bs2{background:transparent;color:var(--txm);border:1px solid var(--bs);}.bs2:hover{border-color:var(--br);color:var(--tx);background:var(--s1);}
.main{padding:28px 32px;display:flex;flex-direction:column;gap:22px;max-height:calc(100vh - 56px);overflow-y:auto;padding-bottom:80px;}
.panel{background:var(--s1);border:1px solid var(--bs);border-radius:11px;overflow:hidden;}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bs);}
.pht{font-size:13px;font-weight:600;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi{background:var(--s1);border:1px solid var(--bs);border-radius:10px;padding:15px 17px;transition:border-color .13s;}
.kpi:hover{border-color:var(--br);}.ka{border-left:2px solid var(--acc);}.ka .kv{color:var(--acc);}
.kl{font-family:DM Mono,monospace;font-size:9px;color:var(--txd);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.kv{font-family:Fraunces,serif;font-size:26px;line-height:1;}.kd{font-size:11px;margin-top:4px;}
.up{color:var(--grn);}.ne{color:var(--txm);}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--bs);background:var(--s2);color:var(--txm);transition:all .12s;}
.chip:hover{border-color:var(--br);color:var(--tx);}.chip.active{background:var(--ad);border-color:var(--br);color:var(--acc);}
::-webkit-scrollbar{width:3px;}</style>
</head>
<body>
<header class="topbar">
  <div class="lm">C</div><div class="lt">Chloe<b>IQ</b></div>
  <div class="sep"></div>
  <div class="pt">Buyer <em>App</em></div><div style="font-size:12px;color:var(--txm);background:var(--s2);border:1px solid var(--bs);border-radius:20px;padding:4px 12px;">Jordan Lee · 87% Match</div><div class="tr"><button class="btn bs2" id="ba-share">Share Profile</button><button class="btn bp" id="ba-contact">Contact Agent</button></div>
</header>
<div class="main">

<div class="g4">
  <div class="kpi ka"><div class="kl">Match Score</div><div class="kv">87<span style="font-size:13px;color:var(--txm);">%</span></div><div class="kd up">↑ Top 8% of buyers</div></div>
  <div class="kpi"><div class="kl">DNA Type</div><div class="kv" style="font-size:18px;">Refined Modern</div><div class="kd ne">Defined · Curated</div></div>
  <div class="kpi"><div class="kl">Homes Visited</div><div class="kv">4</div><div class="kd ne">This month</div></div>
  <div class="kpi"><div class="kl">Best Match</div><div class="kv" style="font-size:16px;">Magnolia Dr</div><div class="kd up">87% · 2847 Flower Mound</div></div>
</div>
<div class="g2">
  <div class="panel">
    <div class="ph"><div class="pht">Your StyleDNA Profile</div><span style="font-family:DM Mono,monospace;font-size:10px;color:var(--acc);background:var(--ad);border:1px solid var(--br);padding:2px 9px;border-radius:20px;">Refined Modern</span></div>
    <div style="padding:20px;display:flex;flex-direction:column;gap:12px;" id="dna-traits"></div>
  </div>
  <div class="panel">
    <div class="ph"><div class="pht">Homes Visited</div></div>
    <div id="homes-visited"></div>
  </div>
</div>
<div class="panel">
  <div class="ph"><div class="pht">Chloe AI — Home Recommendations</div><span style="font-size:12px;color:var(--acc);cursor:pointer;" id="ba-more">See More →</span></div>
  <div class="g3" style="padding:16px 20px;gap:14px;" id="recs-grid"></div>
</div>

</div>
<script>
function toast(msg,type){var o=document.getElementById('_t');if(o)o.remove();var t=document.createElement('div');t.id='_t';t.textContent=msg;var bg=type==='ok'?'#B8E030':'#1A1E12';var c=type==='ok'?'#0A0B07':'#EEF0E5';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:'+bg+';color:'+c+';padding:10px 20px;border-radius:8px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .2s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid rgba(184,224,48,.15);';document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});clearTimeout(t._x);t._x=setTimeout(function(){t.style.opacity='0';},2600);}
function modal(title,body,label,cb){var o=document.getElementById('_m');if(o)o.remove();var el=document.createElement('div');el.id='_m';el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9990;display:flex;align-items:center;justify-content:center;';el.innerHTML='<div style="background:#13160D;border:1px solid rgba(184,224,48,.15);border-radius:13px;padding:26px 28px;min-width:380px;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.6);"><div style="font-family:Fraunces,serif;font-size:19px;margin-bottom:9px;">'+title+'</div><div style="font-size:13px;color:#8A8F7A;line-height:1.6;margin-bottom:20px;">'+body+'</div><div style="display:flex;gap:9px;justify-content:flex-end;"><button id="_mc" style="padding:7px 16px;border-radius:7px;border:1px solid rgba(238,240,229,.08);background:transparent;color:#8A8F7A;font-family:DM Sans,sans-serif;font-size:12px;cursor:pointer;">Cancel</button><button id="_mo" style="padding:7px 16px;border-radius:7px;border:none;background:#B8E030;color:#0A0B07;font-family:DM Sans,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">'+(label||'OK')+'</button></div></div>';document.body.appendChild(el);el.querySelector('#_mc').onclick=function(){el.remove();};el.querySelector('#_mo').onclick=function(){el.remove();if(cb)cb();};el.onclick=function(e){if(e.target===el)el.remove();};}

var traits=[
  {label:'Clean lines over ornate detail',strength:92},
  {label:'Open-concept living spaces',strength:88},
  {label:'Natural light as a priority',strength:85},
  {label:'Integrated smart home tech',strength:79},
  {label:'Neutral palette with accent pops',strength:76},
  {label:'Dedicated home office space',strength:72},
];
var homes=[
  {addr:'2847 Magnolia Drive',area:'Flower Mound',match:87,date:'Today'},
  {addr:'1105 Ridgecrest Lane',area:'Southlake',match:79,date:'Mar 22'},
  {addr:'3310 Elmhurst Blvd',area:'Frisco',match:74,date:'Mar 15'},
  {addr:'504 Lakeview Court',area:'Grapevine',match:61,date:'Mar 10'},
];
var recs=[
  {addr:'2847 Magnolia Drive',area:'Flower Mound',match:87,price:'$724K',why:'Primary suite + open kitchen matches your top traits'},
  {addr:'1445 Clearwater Ct',area:'Colleyville',match:82,price:'$891K',why:'Smart home integration + clean architecture'},
  {addr:'3820 Summit Ridge',area:'Southlake',match:78,price:'$1.05M',why:'Floor-to-ceiling windows, light-filled open plan'},
];
document.addEventListener('DOMContentLoaded',function(){
  var dt=document.getElementById('dna-traits');
  traits.forEach(function(t){
    dt.innerHTML+='<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span style="color:var(--txm);">'+t.label+'</span><span style="font-family:DM Mono,monospace;font-size:11px;color:var(--acc);">'+t.strength+'%</span></div><div style="height:4px;background:var(--s3);border-radius:2px;overflow:hidden;"><div style="height:4px;background:var(--acc);border-radius:2px;width:'+t.strength+'%;"></div></div></div>';
  });
  var hv=document.getElementById('homes-visited');
  homes.forEach(function(h){
    hv.innerHTML+='<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--bs);cursor:pointer;transition:background .11s;" class="hrow"><div><div style="font-size:13px;font-weight:500;">'+h.addr+'</div><div style="font-size:11px;color:var(--txm);">'+h.area+' · '+h.date+'</div></div><div style="display:flex;align-items:center;gap:10px;"><span style="font-family:DM Mono,monospace;font-size:14px;color:var(--acc);">'+h.match+'%</span><button class="btn bp" style="font-size:10px;padding:3px 9px;" data-hv="'+h.addr+'">View Report</button></div></div>';
  });
  document.querySelectorAll('[data-hv]').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();showVisitReport(b.dataset.hv);});});
  document.querySelectorAll('.hrow').forEach(function(r){r.addEventListener('click',function(e){if(!e.target.closest('[data-hv]')){var btn=r.querySelector('[data-hv]');if(btn)showVisitReport(btn.dataset.hv);}});});
  var rg=document.getElementById('recs-grid');
  recs.forEach(function(r){
    rg.innerHTML+='<div style="background:var(--s2);border:1px solid var(--bs);border-radius:9px;padding:16px;cursor:pointer;transition:border-color .12s;" class="rec-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;"><div><div style="font-size:13px;font-weight:500;">'+r.addr+'</div><div style="font-size:11px;color:var(--txm);">'+r.area+' · '+r.price+'</div></div><div style="font-family:Fraunces,serif;font-size:22px;color:var(--acc);">'+r.match+'%</div></div><div style="font-size:12px;color:var(--txm);line-height:1.5;">'+r.why+'</div><button class="btn bp" style="width:100%;justify-content:center;font-size:11px;margin-top:12px;" data-rec="'+r.addr+'">View This Home</button></div>';
  });
  document.querySelectorAll('[data-rec]').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();showHomeDetail(b.dataset.rec);});});
  document.querySelectorAll('.rec-card').forEach(function(c){
    c.addEventListener('mouseover',function(){c.style.borderColor='var(--br)';});
    c.addEventListener('mouseout',function(){c.style.borderColor='var(--bs)';});
    c.addEventListener('click',function(e){if(!e.target.closest('[data-rec]')){var addr=c.querySelector('[data-rec]');if(addr)showHomeDetail(addr.dataset.rec);}});
  });
  document.getElementById('ba-contact').addEventListener('click',function(){modal('Contact Marcus Rivera','Send a message to your agent to schedule a showing or ask questions about any property.','Send Message',function(){toast('Message sent to Marcus Rivera ✓','ok');});});
  document.getElementById('ba-share').addEventListener('click',function(){toast('Buyer profile link copied ✓','ok');});
  document.getElementById('ba-more').addEventListener('click',function(){toast('Loading more recommendations...','');});
});


// ── HOME DETAIL MODAL ────────────────────────────────────────────────────────
var homeDetails = {
  '2847 Magnolia Drive': {
    addr: '2847 Magnolia Drive', area: 'Flower Mound, TX 75022', price: '$724,000',
    match: 87, matchClass: 'high', dna: 'Refined Modern DNA',
    beds: 4, baths: 3.5, sqft: '3,240', garage: 2, year: 2019, lot: '0.28 ac',
    tags: ['Open Concept','Smart Home','Primary Suite','3-Car Garage','Pool Ready'],
    matchReasons: [
      { trait: 'Open-concept living', score: 94 },
      { trait: 'Natural light priority', score: 91 },
      { trait: 'Clean modern lines', score: 88 },
      { trait: 'Smart home integration', score: 84 },
    ],
    topRooms: ['Primary Suite','Open Kitchen','Great Room'],
    description: 'Stunning modern farmhouse in the heart of Flower Mound with soaring ceilings, waterfall island, and a spa-like primary suite. Designed for the buyer who values clean lines and functional luxury.',
    agent: 'Marcus Rivera',
    agentNote: 'Jordan — this one checks every box on your profile. The kitchen remodel was completed in 2023 with the exact appliance suite you flagged. Worth a private tour.',
    listed: '12 days ago', status: 'Active', hoa: '$185/mo',
    showings: 14, savedBy: 9,
  },
  '1445 Clearwater Ct': {
    addr: '1445 Clearwater Ct', area: 'Colleyville, TX 76034', price: '$891,000',
    match: 82, matchClass: 'high', dna: 'Refined Modern DNA',
    beds: 5, baths: 4, sqft: '3,890', garage: 3, year: 2021, lot: '0.35 ac',
    tags: ['Smart Home','Chef Kitchen','Home Theater','Primary Down','Corner Lot'],
    matchReasons: [
      { trait: 'Smart home integration', score: 96 },
      { trait: 'Clean architecture', score: 89 },
      { trait: 'Open-concept living', score: 85 },
      { trait: 'Natural light priority', score: 79 },
    ],
    topRooms: ['Chef Kitchen','Primary Suite','Media Room'],
    description: 'Architecturally distinctive 2021 build with fully integrated Control4 smart system, chef-grade appliances, and a media room pre-wired for 4K. A rare find in Colleyville\'s most sought-after pocket.',
    agent: 'Marcus Rivera',
    agentNote: 'Jordan — the smart home build-out here is next level. Control4 full integration, automated blinds throughout. Your tech preference score puts this at 96% alignment.',
    listed: '8 days ago', status: 'Active', hoa: '$210/mo',
    showings: 21, savedBy: 14,
  },
  '3820 Summit Ridge': {
    addr: '3820 Summit Ridge', area: 'Southlake, TX 76092', price: '$1,050,000',
    match: 78, matchClass: 'mid', dna: 'Refined Modern DNA',
    beds: 5, baths: 4.5, sqft: '4,420', garage: 3, year: 2020, lot: '0.41 ac',
    tags: ['Floor-to-Ceiling Windows','Pool','Outdoor Kitchen','Office','Game Room'],
    matchReasons: [
      { trait: 'Natural light priority', score: 97 },
      { trait: 'Open-concept living', score: 88 },
      { trait: 'Clean modern lines', score: 80 },
      { trait: 'Dedicated home office', score: 76 },
    ],
    topRooms: ['Great Room','Outdoor Living','Home Office'],
    description: 'Statement home with dramatic floor-to-ceiling windows overlooking a resort-style pool. The great room is bathed in natural light from dawn to dusk — built for buyers who refuse to compromise on light.',
    agent: 'Marcus Rivera',
    agentNote: 'Jordan — your natural light score is 85%. This home hits 97% on that trait alone. The outdoor living space is exceptional — plan for 30 min just for the backyard.',
    listed: '22 days ago', status: 'Active', hoa: '$250/mo',
    showings: 31, savedBy: 22,
  }
};

function showHomeDetail(addr) {
  var h = homeDetails[addr];
  if (!h) { toast('Opening ' + addr + '...', ''); return; }

  var existing = document.getElementById('_hd');
  if (existing) existing.remove();

  var matchColor = h.matchClass === 'high' ? '#B8E030' : h.matchClass === 'mid' ? '#F5A623' : '#FF5A4A';

  var html = '';

  // Overlay
  html += '<div id="_hd" style="position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:9990;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:32px 16px;">';
  html += '<div style="background:#13160D;border:1px solid rgba(184,224,48,0.15);border-radius:16px;width:720px;max-width:95vw;box-shadow:0 28px 80px rgba(0,0,0,0.7);overflow:hidden;">';

  // ── Hero bar ──
  html += '<div style="background:linear-gradient(135deg,#1A1E12,#0E1108);padding:24px 28px;border-bottom:1px solid rgba(184,224,48,0.1);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;">';
  html += '<div style="flex:1;">';
  html += '<div style="font-family:Fraunces,serif;font-size:24px;color:#EEF0E5;line-height:1.1;">' + h.addr + '</div>';
  html += '<div style="font-size:12px;color:#8A8F7A;margin-top:4px;">' + h.area + '</div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;">';
  h.tags.forEach(function(tag) {
    html += '<span style="font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(184,224,48,0.08);border:1px solid rgba(184,224,48,0.15);color:#B8E030;font-family:DM Mono,monospace;">' + tag + '</span>';
  });
  html += '</div></div>';
  html += '<div style="text-align:right;flex-shrink:0;">';
  html += '<div style="font-family:Fraunces,serif;font-size:42px;color:' + matchColor + ';line-height:1;">' + h.match + '%</div>';
  html += '<div style="font-size:10px;color:#8A8F7A;font-family:DM Mono,monospace;letter-spacing:0.06em;">MATCH SCORE</div>';
  html += '<div style="font-size:11px;color:#8A8F7A;margin-top:6px;">' + h.dna + '</div>';
  html += '</div>';
  html += '</div>';

  // ── Property specs row ──
  var specs = [
    { label:'Price', val: h.price },
    { label:'Beds', val: h.beds },
    { label:'Baths', val: h.baths },
    { label:'Sq Ft', val: h.sqft },
    { label:'Garage', val: h.garage + ' car' },
    { label:'Built', val: h.year },
    { label:'Lot', val: h.lot },
    { label:'HOA', val: h.hoa },
  ];
  html += '<div style="display:grid;grid-template-columns:repeat(8,1fr);border-bottom:1px solid rgba(238,240,229,0.06);">';
  specs.forEach(function(s, i) {
    html += '<div style="padding:12px 0;text-align:center;' + (i < 7 ? 'border-right:1px solid rgba(238,240,229,0.06);' : '') + '">';
    html += '<div style="font-family:Fraunces,serif;font-size:16px;color:#EEF0E5;">' + s.val + '</div>';
    html += '<div style="font-size:9px;color:#8A8F7A;text-transform:uppercase;letter-spacing:0.07em;margin-top:3px;">' + s.label + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // ── Body: two columns ──
  html += '<div style="display:grid;grid-template-columns:1fr 260px;gap:0;border-bottom:1px solid rgba(238,240,229,0.06);">';

  // Left col
  html += '<div style="padding:22px 24px;border-right:1px solid rgba(238,240,229,0.06);">';

  // Description
  html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.09em;color:#B8E030;text-transform:uppercase;margin-bottom:10px;">About This Home</div>';
  html += '<div style="font-size:13px;color:#8A8F7A;line-height:1.7;margin-bottom:20px;">' + h.description + '</div>';

  // Match breakdown
  html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.09em;color:#B8E030;text-transform:uppercase;margin-bottom:12px;">Why It Matches You</div>';
  h.matchReasons.forEach(function(r) {
    html += '<div style="margin-bottom:10px;">';
    html += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;">';
    html += '<span style="color:#8A8F7A;">' + r.trait + '</span>';
    html += '<span style="font-family:DM Mono,monospace;font-size:11px;color:#B8E030;">' + r.score + '%</span>';
    html += '</div>';
    html += '<div style="height:4px;background:#1A1E12;border-radius:2px;overflow:hidden;">';
    html += '<div style="height:4px;background:#B8E030;border-radius:2px;width:' + r.score + '%;"></div>';
    html += '</div></div>';
  });

  // Top rooms
  html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.09em;color:#B8E030;text-transform:uppercase;margin-top:18px;margin-bottom:10px;">Top Rooms for Your Profile</div>';
  html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
  h.topRooms.forEach(function(room) {
    html += '<div style="background:#1A1E12;border:1px solid rgba(238,240,229,0.08);border-radius:8px;padding:8px 14px;font-size:12px;color:#EEF0E5;">📍 ' + room + '</div>';
  });
  html += '</div>';

  html += '</div>';

  // Right col
  html += '<div style="padding:22px 20px;display:flex;flex-direction:column;gap:16px;">';

  // Listing stats
  html += '<div style="background:#0E1108;border:1px solid rgba(238,240,229,0.06);border-radius:10px;padding:14px 16px;">';
  html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.09em;color:#B8E030;text-transform:uppercase;margin-bottom:10px;">Listing Activity</div>';
  html += '<div style="display:flex;flex-direction:column;gap:8px;">';
  [
    { k:'Status', v:'● ' + h.status, accent: true },
    { k:'Listed', v: h.listed },
    { k:'Showings', v: h.showings + ' scheduled' },
    { k:'Saved By', v: h.savedBy + ' buyers' },
  ].forEach(function(row) {
    html += '<div style="display:flex;justify-content:space-between;font-size:12px;">';
    html += '<span style="color:#8A8F7A;">' + row.k + '</span>';
    html += '<span style="color:' + (row.accent ? '#4ADE80' : '#EEF0E5') + ';font-family:DM Mono,monospace;font-size:11px;">' + row.v + '</span>';
    html += '</div>';
  });
  html += '</div></div>';

  // Agent note
  html += '<div style="background:#0E1108;border:1px solid rgba(184,224,48,0.12);border-radius:10px;padding:14px 16px;">';
  html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.09em;color:#B8E030;text-transform:uppercase;margin-bottom:8px;">Agent Note · ' + h.agent + '</div>';

  html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.09em;color:#B8E030;text-transform:uppercase;margin-bottom:8px;">Your Notes</div>';
  html += '<textarea id="_vr-notes" rows="5" placeholder="Jot down your thoughts — what you loved, what gave you pause, questions to ask at a second showing…" style="width:100%;background:transparent;border:none;color:#EEF0E5;font-family:DM Sans,sans-serif;font-size:12px;line-height:1.6;resize:none;outline:none;box-sizing:border-box;">' + (h.yourNotes || '') + '</textarea>';
  html += '</div>';

  html += '</div>'; // end right col
  html += '</div>'; // end body grid

  // Footer
  html += '<div style="padding:16px 22px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid rgba(184,224,48,0.08);">';
  html += '<button id="_vr-close" style="padding:9px 18px;border-radius:8px;border:1px solid rgba(238,240,229,0.1);background:transparent;color:#8A8F7A;font-family:DM Sans,sans-serif;font-size:13px;cursor:pointer;">Close</button>';
  html += '<button id="_vr-send" style="padding:9px 18px;border-radius:8px;border:1px solid rgba(184,224,48,0.2);background:rgba(184,224,48,0.08);color:#B8E030;font-family:DM Sans,sans-serif;font-size:13px;cursor:pointer;">Send Follow-Up</button>';
  html += '<button id="_vr-tour" style="padding:9px 20px;border-radius:8px;border:none;background:#B8E030;color:#0A0B07;font-family:DM Sans,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">Schedule Showing →</button>';
  html += '</div>';

  html += '</div>'; // end card
  overlay.innerHTML = html;
  document.body.appendChild(overlay);

  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  document.getElementById('_vr-x').addEventListener('click', function() { overlay.remove(); });
  document.getElementById('_vr-close').addEventListener('click', function() { overlay.remove(); });

  // Save notes on close
  var notesArea = document.getElementById('_vr-notes');
  if (notesArea && h.yourNotes !== undefined) {
    notesArea.addEventListener('input', function() {
      h.yourNotes = notesArea.value;
    });
  }

  document.getElementById('_vr-send').addEventListener('click', function() {
    overlay.remove();
    showFollowUpModal(h);
  });

  document.getElementById('_vr-tour').addEventListener('click', function() {
    overlay.remove();
    // Build a minimal h-like object for the schedule modal
    showScheduleModal({ addr: h.addr, agent: 'Marcus Rivera' });
  });
}

// ── SEND FOLLOW-UP MODAL (Step 1: Edit draft, Step 2: Pick channel) ──────────
function showFollowUpModal(h) {
  var existing = document.getElementById('_fu');
  if (existing) existing.remove();

  var overlay = document.createElement('div');
  overlay.id = '_fu';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:9996;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:32px 16px;';

  function renderStep1() {
    overlay.innerHTML = buildStep1(h);
    wireStep1();
  }

  function renderStep2(draft) {
    overlay.innerHTML = buildStep2(h, draft);
    wireStep2(draft);
  }

  function buildStep1(h) {
    var html = '';
    html += '<div style="background:#13160D;border:1px solid rgba(184,224,48,0.18);border-radius:16px;width:520px;max-width:95vw;box-shadow:0 24px 72px rgba(0,0,0,0.7);">';

    // Header
    html += '<div style="padding:24px 26px 0;">';
    html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;">';
    html += '<div>';
    html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.1em;color:#B8E030;text-transform:uppercase;font-family:DM Mono,monospace;margin-bottom:6px;">Step 1 of 2 · Review Draft</div>';
    html += '<div style="font-family:Fraunces,serif;font-size:20px;color:#EEF0E5;">Send <em style=\'color:#B8E030;\'>Follow-Up</em></div>';
    html += '<div style="font-size:12px;color:#8A8F7A;margin-top:3px;">To: Jordan Lee &nbsp;·&nbsp; Re: ' + h.addr + '</div>';
    html += '</div>';
    html += '<button id="_fu-x" style="background:none;border:none;color:#8A8F7A;font-size:18px;cursor:pointer;padding:2px 6px;">✕</button>';
    html += '</div>';
    html += '<div style="height:1px;background:rgba(184,224,48,0.1);margin:16px 0 18px;"></div>';

    // Tone selector
    html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.09em;color:#B8E030;text-transform:uppercase;margin-bottom:10px;">Tone</div>';
    html += '<div style="display:flex;gap:8px;margin-bottom:18px;">';
    var tones = [
      { id:'tone-warm',   label:'Warm',       active: true  },
      { id:'tone-pro',    label:'Professional', active: false },
      { id:'tone-urgent', label:'Urgent',      active: false },
    ];
    tones.forEach(function(t) {
      var act = t.active ? 'background:rgba(184,224,48,0.1);border-color:rgba(184,224,48,0.4);color:#B8E030;' : 'background:#0E1108;border-color:rgba(238,240,229,0.08);color:#8A8F7A;';
      html += '<div class="_fu-tone" data-tone="' + t.id + '" style="' + act + 'border:1px solid;border-radius:8px;padding:7px 16px;font-size:12px;cursor:pointer;transition:all 0.12s;">' + t.label + '</div>';
    });
    html += '</div>';

    // Subject line
    html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.09em;color:#B8E030;text-transform:uppercase;margin-bottom:8px;">Subject Line</div>';
    html += '<input id="_fu-subject" type="text" value="Following up on ' + h.addr + '" style="width:100%;background:#0E1108;border:1px solid rgba(238,240,229,0.1);border-radius:8px;padding:10px 12px;color:#EEF0E5;font-family:DM Sans,sans-serif;font-size:13px;outline:none;box-sizing:border-box;margin-bottom:16px;" />';

    // Draft body
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">';
    html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.09em;color:#B8E030;text-transform:uppercase;">Message</div>';
    html += '<span id="_fu-regen" style="font-size:11px;color:#B8E030;cursor:pointer;">↺ Regenerate with Chloe AI</span>';
    html += '</div>';
    html += '<textarea id="_fu-body" rows="6" style="width:100%;background:#0E1108;border:1px solid rgba(238,240,229,0.1);border-radius:8px;padding:10px 12px;color:#EEF0E5;font-family:DM Sans,sans-serif;font-size:13px;line-height:1.6;resize:vertical;outline:none;box-sizing:border-box;">' + h.draft + '</textarea>';
    html += '</div>'; // end padding

    // Footer
    html += '<div style="padding:16px 26px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(184,224,48,0.08);margin-top:18px;">';
    html += '<div style="font-size:11px;color:#4A4F3A;">Powered by Chloe AI · Personalized to Jordan\'s DNA profile</div>';
    html += '<div style="display:flex;gap:10px;">';
    html += '<button id="_fu-cancel" style="padding:9px 18px;border-radius:8px;border:1px solid rgba(238,240,229,0.1);background:transparent;color:#8A8F7A;font-family:DM Sans,sans-serif;font-size:13px;cursor:pointer;">Cancel</button>';
    html += '<button id="_fu-next" style="padding:9px 22px;border-radius:8px;border:none;background:#B8E030;color:#0A0B07;font-family:DM Sans,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">Choose Channel →</button>';
    html += '</div></div>';

    html += '</div>'; // end card
    return html;
  }

  function wireStep1() {
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    document.getElementById('_fu-x').addEventListener('click', function() { overlay.remove(); });
    document.getElementById('_fu-cancel').addEventListener('click', function() { overlay.remove(); });

    // Tone toggle
    overlay.querySelectorAll('._fu-tone').forEach(function(btn) {
      btn.addEventListener('click', function() {
        overlay.querySelectorAll('._fu-tone').forEach(function(b) {
          b.style.background = '#0E1108';
          b.style.borderColor = 'rgba(238,240,229,0.08)';
          b.style.color = '#8A8F7A';
        });
        btn.style.background = 'rgba(184,224,48,0.1)';
        btn.style.borderColor = 'rgba(184,224,48,0.4)';
        btn.style.color = '#B8E030';
      });
    });

    // Regenerate
    document.getElementById('_fu-regen').addEventListener('click', function() {
      var el = this;
      el.textContent = '↺ Generating…';
      el.style.opacity = '0.5';
      setTimeout(function() {
        var area = document.getElementById('_fu-body');
        if (area) area.value = 'Hi Jordan — just wanted to circle back on ' + h.addr + '. Given your Refined Modern profile, I believe this is one of the strongest matches we\'ve seen at this price point. I\'d love to get your thoughts — are you available for a quick call or a second walkthrough this week?';
        el.textContent = '↺ Regenerate with Chloe AI';
        el.style.opacity = '1';
        toast('Draft regenerated ✓', 'ok');
      }, 1100);
    });

    // Next → step 2
    document.getElementById('_fu-next').addEventListener('click', function() {
      var draft = (document.getElementById('_fu-body').value || '').trim();
      if (!draft) { toast('Please write a message first', ''); return; }
      renderStep2(draft);
    });
  }

  function buildStep2(h, draft) {
    var html = '';
    html += '<div style="background:#13160D;border:1px solid rgba(184,224,48,0.18);border-radius:16px;width:520px;max-width:95vw;box-shadow:0 24px 72px rgba(0,0,0,0.7);">';

    html += '<div style="padding:24px 26px 0;">';
    html += '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;">';
    html += '<div>';
    html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.1em;color:#B8E030;text-transform:uppercase;font-family:DM Mono,monospace;margin-bottom:6px;">Step 2 of 2 · Choose Channel</div>';
    html += '<div style="font-family:Fraunces,serif;font-size:20px;color:#EEF0E5;">Send <em style=\'color:#B8E030;\'>Follow-Up</em></div>';
    html += '<div style="font-size:12px;color:#8A8F7A;margin-top:3px;">To: Jordan Lee &nbsp;·&nbsp; Re: ' + h.addr + '</div>';
    html += '</div>';
    html += '<button id="_fu-x2" style="background:none;border:none;color:#8A8F7A;font-size:18px;cursor:pointer;padding:2px 6px;">✕</button>';
    html += '</div>';
    html += '<div style="height:1px;background:rgba(184,224,48,0.1);margin:16px 0 18px;"></div>';

    // Channel cards
    html += '<div style="font-size:10px;font-weight:700;letter-spacing:0.09em;color:#B8E030;text-transform:uppercase;margin-bottom:12px;">Send Via</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;">';
    var channels = [
      { id:'ch-email', icon:'✉️', label:'Email',      sub:'jordan@email.com',   active:false },
      { id:'ch-text',  icon:'💬', label:'Text',       sub:'(214) 555-0182',      active:false },
      { id:'ch-both',  icon:'⚡', label:'Email + Text', sub:'Both channels',    active:true  },
    ];
    channels.forEach(function(ch) {
      var act = ch.active ? 'border-color:rgba(184,224,48,0.4);background:rgba(184,224,48,0.06);' : 'border-color:rgba(238,240,229,0.08);background:#0E1108;';
      html += '<div class="_fu-ch" data-ch="' + ch.id + '" style="' + act + 'border:1px solid;border-radius:10px;padding:14px;cursor:pointer;transition:all 0.12s;text-align:center;">';
      html += '<div style="font-size:20px;margin-bottom:6px;">' + ch.icon + '</div>';
      html += '<div style="font-size:13px;color:#EEF0E5;font-weight:500;margin-bottom:3px;">' + ch.label + '</div>';
      html += '<div style="font-size:10px;color:#8A8F7A;font-family:DM Mono,monospace;">' + ch.sub + '</div>';
      html += '</div>';
    });
    html += '</div>';

    // Schedule toggle
    html += '<div style="background:#0E1108;border:1px solid rgba(238,240,229,0.06);border-radius:10px;padding:14px 16px;margin-bottom:20px;">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;">';
    html += '<div>';
    html += '<div style="font-size:13px;color:#EEF0E5;font-weight:500;margin-bottom:2px;">Send Now</div>';
    html += '<div style="font-size:11px;color:#8A8F7A;">Or schedule for a specific time</div>';
    html += '</div>';
    html += '<div style="display:flex;gap:0;border:1px solid rgba(238,240,229,0.1);border-radius:8px;overflow:hidden;">';
    html += '<button class="_fu-when active-when" data-when="now" style="padding:6px 14px;font-size:12px;border:none;background:rgba(184,224,48,0.1);color:#B8E030;cursor:pointer;font-family:DM Sans,sans-serif;">Now</button>';
    html += '<button class="_fu-when" data-when="schedule" style="padding:6px 14px;font-size:12px;border:none;border-left:1px solid rgba(238,240,229,0.1);background:transparent;color:#8A8F7A;cursor:pointer;font-family:DM Sans,sans-serif;">Schedule</button>';
    html += '</div>';
    html += '</div>';
    html += '<div id="_fu-schedule-row" style="display:none;margin-top:12px;display:none;">';
    html += '<input id="_fu-sched-time" type="datetime-local" style="background:#13160D;border:1px solid rgba(238,240,229,0.1);border-radius:8px;padding:8px 12px;color:#EEF0E5;font-family:DM Sans,sans-serif;font-size:13px;outline:none;color-scheme:dark;width:100%;box-sizing:border-box;" />';
    html += '</div>';
    html += '</div>';

    html += '</div>'; // end padding

    // Footer
    html += '<div style="padding:16px 26px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(184,224,48,0.08);">';
    html += '<button id="_fu-back" style="padding:9px 16px;border-radius:8px;border:1px solid rgba(238,240,229,0.1);background:transparent;color:#8A8F7A;font-family:DM Sans,sans-serif;font-size:13px;cursor:pointer;">← Back</button>';
    html += '<div style="display:flex;gap:10px;">';
    html += '<button id="_fu-cancel2" style="padding:9px 18px;border-radius:8px;border:1px solid rgba(238,240,229,0.1);background:transparent;color:#8A8F7A;font-family:DM Sans,sans-serif;font-size:13px;cursor:pointer;">Cancel</button>';
    html += '<button id="_fu-send-final" style="padding:9px 22px;border-radius:8px;border:none;background:#B8E030;color:#0A0B07;font-family:DM Sans,sans-serif;font-size:13px;font-weight:700;cursor:pointer;">Send Follow-Up ✓</button>';
    html += '</div></div>';

    html += '</div>'; // end card
    return html;
  }

  function wireStep2(draft) {
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    document.getElementById('_fu-x2').addEventListener('click', function() { overlay.remove(); });
    document.getElementById('_fu-cancel2').addEventListener('click', function() { overlay.remove(); });
    document.getElementById('_fu-back').addEventListener('click', function() { renderStep1(); });

    // Channel toggle
    overlay.querySelectorAll('._fu-ch').forEach(function(card) {
      card.addEventListener('click', function() {
        overlay.querySelectorAll('._fu-ch').forEach(function(c) {
          c.style.borderColor = 'rgba(238,240,229,0.08)';
          c.style.background = '#0E1108';
        });
        card.style.borderColor = 'rgba(184,224,48,0.4)';
        card.style.background = 'rgba(184,224,48,0.06)';
      });
    });

    // Now / Schedule toggle
    overlay.querySelectorAll('._fu-when').forEach(function(btn) {
      btn.addEventListener('click', function() {
        overlay.querySelectorAll('._fu-when').forEach(function(b) {
          b.style.background = 'transparent';
          b.style.color = '#8A8F7A';
        });
        btn.style.background = 'rgba(184,224,48,0.1)';
        btn.style.color = '#B8E030';
        var row = document.getElementById('_fu-schedule-row');
        if (row) row.style.display = btn.getAttribute('data-when') === 'schedule' ? 'block' : 'none';
      });
    });

    // Send
    document.getElementById('_fu-send-final').addEventListener('click', function() {
      var activeChannel = overlay.querySelector('._fu-ch[style*="rgba(184,224,48,0.4)"]');
      var channelLabel = activeChannel ? activeChannel.querySelector('div:nth-child(2)').textContent : 'Email + Text';
      var schedRow = document.getElementById('_fu-schedule-row');
      var isScheduled = schedRow && schedRow.style.display !== 'none';
      var schedTime = isScheduled ? (document.getElementById('_fu-sched-time').value || '') : '';

      overlay.remove();

      if (isScheduled && schedTime) {
        toast('Follow-up scheduled · ' + channelLabel + ' · ' + schedTime + ' ✓', 'ok');
      } else {
        toast('Follow-up sent via ' + channelLabel + ' to Jordan Lee ✓', 'ok');
        setTimeout(function() { toast('Delivery confirmed · Message opened ✓', 'ok'); }, 1600);
      }
    });
  }

  document.body.appendChild(overlay);
  renderStep1();
}
</script>
