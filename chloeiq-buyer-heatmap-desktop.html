<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ChloeIQ — Buyer Heatmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0B07;--s1:#13160D;--s2:#1A1E12;--s3:#222818;--acc:#B8E030;--ad:rgba(184,224,48,.10);--tx:#EEF0E5;--txm:#8A8F7A;--txd:#4A5040;--br:rgba(184,224,48,.12);--bs:rgba(238,240,229,.06);--grn:#4ADE80;--red:#FF5A4A;--amb:#F5A623;--blu:#60A5FA;--pur:#A78BFA;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;overflow-x:hidden;}
.topbar{height:56px;display:flex;align-items:center;padding:0 28px;border-bottom:1px solid var(--bs);background:var(--bg);gap:12px;position:sticky;top:0;z-index:20;}
.lm{width:28px;height:28px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:14px;font-weight:600;color:var(--bg);}
.lt{font-family:'Fraunces',serif;font-size:17px;}.lt b{color:var(--acc);font-weight:400;}
.pt{font-family:'Fraunces',serif;font-size:18px;font-weight:400;}.pt em{color:var(--acc);font-style:italic;}
.sep{width:1px;height:20px;background:var(--bs);}
.tr{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;border:none;transition:all .13s;}
.bp{background:var(--acc);color:var(--bg);}.bp:hover{background:#c8f040;}
.bs2{background:transparent;color:var(--txm);border:1px solid var(--bs);}.bs2:hover{border-color:var(--br);color:var(--tx);background:var(--s1);}
.main{padding:28px 32px;display:flex;flex-direction:column;gap:22px;max-height:calc(100vh - 56px);overflow-y:auto;}
.panel{background:var(--s1);border:1px solid var(--bs);border-radius:11px;overflow:hidden;}
.ph{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bs);}
.pht{font-size:13px;font-weight:600;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi{background:var(--s1);border:1px solid var(--bs);border-radius:10px;padding:15px 17px;transition:border-color .13s;}
.kpi:hover{border-color:var(--br);}.ka{border-left:2px solid var(--acc);}.ka .kv{color:var(--acc);}
.kl{font-family:'DM Mono',monospace;font-size:9px;color:var(--txd);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.kv{font-family:'Fraunces',serif;font-size:26px;line-height:1;}.kd{font-size:11px;margin-top:4px;}
.up{color:var(--grn);}.ne{color:var(--txm);}
::-webkit-scrollbar{width:3px;}</style>
</head>
<body>
<header class="topbar">
  <div class="lm">C</div><div class="lt">Chloe<b>IQ</b></div>
  <div class="sep"></div>
  <div class="pt">Buyer <em>Heatmap</em></div><div class="tr"><button class="btn bs2" id="hm-export">Export Data</button><button class="btn bp" id="hm-alert">Set Alert</button></div>
</header>
<div class="main">

<div class="g4">
  <div class="kpi ka"><div class="kl">Active Buyer Zones</div><div class="kv">8</div><div class="kd up">↑ 2 new this month</div></div>
  <div class="kpi"><div class="kl">Total Buyer Signals</div><div class="kv">1,486</div><div class="kd up">↑ 31% this month</div></div>
  <div class="kpi"><div class="kl">Hottest ZIP</div><div class="kv" style="font-size:16px;">75022</div><div class="kd up">Flower Mound · Score 94</div></div>
  <div class="kpi"><div class="kl">Dominant DNA</div><div class="kv" style="font-size:16px;">Refined</div><div class="kd ne">Modern · 38% of market</div></div>
</div>
<div class="g2">
  <div class="panel">
    <div class="ph"><div class="pht">DFW Demand Heatmap</div>
      <div style="display:flex;gap:6px;">
        <div style="font-size:11px;color:var(--txm);display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--acc);display:inline-block;"></span>Hot</div>
        <div style="font-size:11px;color:var(--txm);display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--amb);display:inline-block;"></span>Warm</div>
        <div style="font-size:11px;color:var(--txm);display:flex;align-items:center;gap:4px;"><span style="width:8px;height:8px;border-radius:50%;background:var(--blu);display:inline-block;"></span>Active</div>
      </div>
    </div>
    <div style="background:var(--s2);position:relative;height:340px;" id="hm-map">
      <svg width="100%" height="100%" viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <rect width="600" height="340" fill="#1A1E12"/>
        <g stroke="#222818" stroke-width="1.5">
          <line x1="0" y1="85" x2="600" y2="85"/><line x1="0" y1="170" x2="600" y2="170"/><line x1="0" y1="255" x2="600" y2="255"/>
          <line x1="120" y1="0" x2="120" y2="340"/><line x1="240" y1="0" x2="240" y2="340"/><line x1="360" y1="0" x2="360" y2="340"/><line x1="480" y1="0" x2="480" y2="340"/>
        </g>
        <path d="M 0 130 Q 150 140 300 120 Q 450 100 600 130" fill="none" stroke="#2A3020" stroke-width="3"/>
        <path d="M 0 220 Q 200 210 360 230 Q 480 245 600 220" fill="none" stroke="#2A3020" stroke-width="3"/>
        <text x="20" y="290" fill="#2A3020" font-family="DM Mono" font-size="11" letter-spacing="1">FLOWER MOUND</text>
        <text x="390" y="70" fill="#2A3020" font-family="DM Mono" font-size="11" letter-spacing="1">SOUTHLAKE</text>
        <text x="250" y="40" fill="#2A3020" font-family="DM Mono" font-size="11" letter-spacing="1">FRISCO</text>
        <text x="130" y="185" fill="#2A3020" font-family="DM Mono" font-size="11" letter-spacing="1">LEWISVILLE</text>
        <text x="380" y="185" fill="#2A3020" font-family="DM Mono" font-size="11" letter-spacing="1">GRAPEVINE</text>
      </svg>
      <div id="hm-blobs"></div>
      <div id="hm-labels"></div>
    </div>
  </div>
  <div class="panel">
    <div class="ph"><div class="pht">ZIP Code Rankings</div></div>
    <div id="zip-ranks"></div>
  </div>
</div>
<div class="panel">
  <div class="ph"><div class="pht">DNA Concentration by Zone</div></div>
  <div class="g4" style="padding:16px 20px;gap:12px;" id="dna-grid"></div>
</div>

</div>
<script>
function toast(msg,type){var o=document.getElementById('_t');if(o)o.remove();var t=document.createElement('div');t.id='_t';t.textContent=msg;var bg=type==='ok'?'#B8E030':'#1A1E12';var c=type==='ok'?'#0A0B07':'#EEF0E5';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:'+bg+';color:'+c+';padding:10px 20px;border-radius:8px;font-family:DM Sans,sans-serif;font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .2s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid rgba(184,224,48,.15);';document.body.appendChild(t);requestAnimationFrame(function(){t.style.opacity='1';t.style.transform='translateX(-50%) translateY(0)';});clearTimeout(t._x);t._x=setTimeout(function(){t.style.opacity='0';},2600);}
function modal(title,body,label,cb){var o=document.getElementById('_m');if(o)o.remove();var el=document.createElement('div');el.id='_m';el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9990;display:flex;align-items:center;justify-content:center;';el.innerHTML='<div style="background:#13160D;border:1px solid rgba(184,224,48,.15);border-radius:13px;padding:26px 28px;min-width:380px;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.6);"><div style="font-family:Fraunces,serif;font-size:19px;margin-bottom:9px;">'+title+'</div><div style="font-size:13px;color:#8A8F7A;line-height:1.6;margin-bottom:20px;">'+body+'</div><div style="display:flex;gap:9px;justify-content:flex-end;"><button id="_mc" style="padding:7px 16px;border-radius:7px;border:1px solid rgba(238,240,229,.08);background:transparent;color:#8A8F7A;font-family:DM Sans,sans-serif;font-size:12px;cursor:pointer;">Cancel</button><button id="_mo" style="padding:7px 16px;border-radius:7px;border:none;background:#B8E030;color:#0A0B07;font-family:DM Sans,sans-serif;font-size:12px;font-weight:600;cursor:pointer;">'+(label||'OK')+'</button></div></div>';document.body.appendChild(el);el.querySelector('#_mc').onclick=function(){el.remove();};el.querySelector('#_mo').onclick=function(){el.remove();if(cb)cb();};el.onclick=function(e){if(e.target===el)el.remove();};}

var zones=[
  {zip:'75022',area:'Flower Mound',score:94,buyers:247,heat:'hot',x:14,y:62,dna:'Refined Modern',pct:42},
  {zip:'75034',area:'Frisco',score:91,buyers:218,heat:'hot',x:44,y:18,dna:'Coastal Luxe',pct:38},
  {zip:'76092',area:'Southlake',score:88,buyers:196,heat:'hot',x:72,y:15,dna:'Refined Modern',pct:44},
  {zip:'75024',area:'Plano',score:82,buyers:184,heat:'warm',x:38,y:38,dna:'Warm Organic',pct:31},
  {zip:'76051',area:'Grapevine',score:78,buyers:167,heat:'warm',x:65,y:47,dna:'Warm Organic',pct:29},
  {zip:'75028',area:'Lewisville',score:71,buyers:148,heat:'cool',x:20,y:47,dna:'Bold Eclectic',pct:26},
  {zip:'75010',area:'Carrollton',score:64,buyers:122,heat:'cool',x:50,y:58,dna:'Warm Organic',pct:33},
  {zip:'75019',area:'Coppell',score:59,buyers:104,heat:'cold',x:60,y:68,dna:'Refined Modern',pct:28},
];
function buildHeatmap(){
  var map=document.getElementById('hm-map');
  var W=map.offsetWidth||600,H=map.offsetHeight||340;
  var blobs=document.getElementById('hm-blobs');
  var labels=document.getElementById('hm-labels');
  if(!blobs||!labels)return;
  blobs.innerHTML='';labels.innerHTML='';
  zones.forEach(function(z){
    var x=z.x/100*W,y=z.y/100*H;
    var color=z.heat==='hot'?'rgba(184,224,48,':z.heat==='warm'?'rgba(245,166,35,':z.heat==='cool'?'rgba(96,165,250,':'rgba(80,90,70,';
    var r=z.heat==='hot'?90:z.heat==='warm'?70:55;
    var alpha=z.heat==='hot'?'0.20)':z.heat==='warm'?'0.15)':'0.10)';
    var blob=document.createElement('div');
    blob.style.cssText='position:absolute;left:'+x+'px;top:'+y+'px;width:'+(r*2)+'px;height:'+(r*2)+'px;border-radius:50%;background:radial-gradient(circle,'+color+alpha+' 0%,transparent 70%);transform:translate(-50%,-50%);pointer-events:none;';
    blobs.appendChild(blob);
    var lbl=document.createElement('div');
    lbl.style.cssText='position:absolute;left:'+x+'px;top:'+y+'px;transform:translate(-50%,-50%);cursor:pointer;z-index:5;text-align:center;';
    lbl.innerHTML='<div style="background:'+(z.heat==='hot'?'var(--acc)':z.heat==='warm'?'var(--amb)':z.heat==='cool'?'var(--blu)':'var(--s3)')+';color:'+(z.heat==='cold'?'var(--txm)':'var(--bg)')+';font-family:DM Mono,monospace;font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px;white-space:nowrap;">'+z.zip+' · '+z.score+'</div>';
    lbl.title=z.area+' — '+z.buyers+' buyers';
    lbl.addEventListener('click',function(){toast(z.area+' ('+z.zip+') · Demand '+z.score+' · '+z.buyers+' buyers · '+z.dna,'');});
    labels.appendChild(lbl);
  });
}
function buildZIPRanks(){
  var el=document.getElementById('zip-ranks');if(!el)return;
  var sorted=zones.slice().sort(function(a,b){return b.score-a.score;});
  sorted.forEach(function(z,i){
    var color=z.heat==='hot'?'var(--acc)':z.heat==='warm'?'var(--amb)':'var(--blu)';
    el.innerHTML+='<div style="display:flex;align-items:center;gap:12px;padding:10px 18px;border-bottom:1px solid var(--bs);cursor:pointer;transition:background .11s;" class="zr">'
      +'<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--txd);width:18px;">'+(i+1)+'</span>'
      +'<div style="flex:1;"><div style="font-size:13px;font-weight:500;">'+z.area+'</div><div style="font-size:11px;color:var(--txm);">'+z.zip+' · '+z.dna+'</div></div>'
      +'<div style="text-align:right;"><div style="font-family:'Fraunces',serif;font-size:22px;color:'+color+';">'+z.score+'</div><div style="font-size:10px;color:var(--txm);">'+z.buyers+' buyers</div></div>'
      +'</div>';
  });
  document.querySelectorAll('.zr').forEach(function(r){r.addEventListener('mouseover',function(){r.style.background='var(--s2)';});r.addEventListener('mouseout',function(){r.style.background='';});r.addEventListener('click',function(){var zip=r.querySelector('.n');toast(r.querySelectorAll('div')[1].querySelector('div:first-child').textContent+' — viewing on map','');});});
}
function buildDNAGrid(){
  var el=document.getElementById('dna-grid');if(!el)return;
  var dnas=['Refined Modern','Coastal Luxe','Warm Organic','Bold Eclectic'];
  var colors=['var(--acc)','var(--blu)','var(--amb)','var(--pur)'];
  var pcts=[38,22,24,16];
  dnas.forEach(function(d,i){
    el.innerHTML+='<div style="background:var(--s2);border:1px solid var(--bs);border-radius:9px;padding:14px;cursor:pointer;transition:border-color .12s;" class="dna-card">'
      +'<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--txd);letter-spacing:.8px;margin-bottom:6px;">DNA TYPE</div>'
      +'<div style="font-size:13px;font-weight:500;margin-bottom:8px;">'+d+'</div>'
      +'<div style="font-family:'Fraunces',serif;font-size:28px;color:'+colors[i]+';">'+pcts[i]+'%</div>'
      +'<div style="font-size:11px;color:var(--txm);margin-top:3px;">of DFW market</div>'
      +'<div style="height:3px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:8px;"><div style="height:3px;background:'+colors[i]+';border-radius:2px;width:'+pcts[i]+'%;"></div></div>'
      +'</div>';
  });
  document.querySelectorAll('.dna-card').forEach(function(c){c.addEventListener('mouseover',function(){c.style.borderColor='var(--br)';});c.addEventListener('mouseout',function(){c.style.borderColor='var(--bs)';});c.addEventListener('click',function(){toast(c.querySelectorAll('div')[1].textContent+' — filtering map...','');});});
}
document.addEventListener('DOMContentLoaded',function(){
  buildHeatmap();buildZIPRanks();buildDNAGrid();
  document.getElementById('hm-export').addEventListener('click',function(){toast('Exporting heatmap data...','');setTimeout(function(){toast('buyer-heatmap-dfw.csv downloaded ✓','ok');},1000);});
  document.getElementById('hm-alert').addEventListener('click',function(){modal('Set Heatmap Alert','Choose a ZIP code and demand threshold. Chloe will notify you when buyer activity crosses the threshold.','Create Alert',function(){toast('Alert created ✓','ok');});});
  window.addEventListener('resize',buildHeatmap);
});

</script>
<script src="chloeiq-nav.js"></script>
</body>
</html>
